  # ===== Phase 15.2a hotfix: CORS preflight (OPTIONS) Mock Integrations =====
  # The SPA at https://dn8bulnup9krf.cloudfront.net invokes the REST API
  # from a different origin, so browsers issue an OPTIONS preflight per
  # request. The 18 OPTIONS methods below answer that preflight with
  # 200 + the same CORS headers shared.api.cors.with_cors_headers writes
  # on the Lambda side. Mock Integration means no Lambda is invoked
  # (faster + cheaper + no cold-start surprise on preflight).
  AuthRecordFailureOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref AuthRecordFailureResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Idempotency-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,PATCH,OPTIONS'"
            ResponseTemplates:
              application/json: ""
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: true
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true

