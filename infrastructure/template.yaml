AWSTemplateFormatVersion: "2010-09-09"

Description: >
  Safety Confirmation System - Single CloudFormation Stack.
  Phase 1.1 はスケルトンのみ。Phase 1.2 以降で Parameters / Mappings / Conditions /
  Resources / Outputs / Rules を順次拡充する。

# ----- Parameters -----
# Phase 1.2: 24 parameters covering environment selection, external Connect references
# (instance id/arn, outbound & inbound phone number arns including
# ConnectInboundPhoneNumberArn for Requirement 13.1, outbound & inbound contact flow ids),
# cycle defaults, guidance text, retention windows, optional custom domain and the
# Route 53 hosted zone for the SPA ALIAS record (HostedZoneId, Phase 11.3 — empty string
# means "do not create the RecordSet"), concurrency cap, Transcribe language, the
# Amazon Connect call-recording storage config gate (ManageConnectStorageConfig,
# Phase 7.2 — opt-in flag so the AWS::Connect::InstanceStorageConfig resource is only
# created when the externally-managed Connect instance has no pre-existing
# CALL_RECORDINGS storage config), and the Connect-native recording prefix
# (ConnectRecordingsPrefix, Phase 7.2 — S3 key prefix where Connect writes raw
# recordings before the RecordingRelocator Lambda renames them into the design layout).
# Constraints align with design.md / Parameters and the related Acceptance Criteria
# (Requirements 6.2, 9.6, 10.4, 13.1, 13.5, 13.6, 14.5, 14.6, 16.5, 17.1, 17.2, 17.3,
# 17.5). Description fields are in Japanese for operator readability on the AWS console.
Parameters:
  # --- Environment selection (Requirement 17.2) ---
  EnvironmentName:
    Type: String
    AllowedValues: [dev, stg, prod]
    Description: 環境名（dev/stg/prod のいずれか）

  # --- External Amazon Connect references (CFn-managed scope outside; Requirement 17.5) ---
  ConnectInstanceId:
    Type: String
    Description: 外部 Amazon Connect インスタンス ID（CFn 管理外）

  ConnectInstanceArn:
    Type: String
    Description: 外部 Amazon Connect インスタンス ARN（IAM Resource 限定用）

  ConnectOutboundPhoneNumberArn:
    Type: String
    Description: アウトバウンド発信元電話番号 ARN（CFn 管理外）

  ConnectOutboundPhoneNumber:
    Type: String
    Default: "+810000000000"
    AllowedPattern: "^\\+[1-9]\\d{1,14}$"
    Description: アウトバウンド発信元電話番号（E.164 形式、ConnectOutboundPhoneNumberArn と対応する電話番号本体、Phase 6.2 ConnectDispatcher が SourcePhoneNumber に使用）

  ConnectInboundPhoneNumberArn:
    Type: String
    Description: インバウンド代表電話番号 ARN（CFn 管理外、Requirement 13.1）

  OutboundContactFlowId:
    Type: String
    Description: アウトバウンド Contact Flow ID（CFn 管理外）

  InboundContactFlowId:
    Type: String
    Description: インバウンド Contact Flow ID（CFn 管理外）

  # --- Cycle defaults (Requirements 4.6 / 4.7 / 4.10) ---
  DefaultRetryCount:
    Type: Number
    Default: 3
    MinValue: 0
    MaxValue: 5
    Description: Cycle 起動時の Retry_Count 既定値（0-5）

  DefaultRetryIntervalMinutes:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 60
    Description: Cycle 起動時の Retry_Interval 既定値（1-60 分）

  # --- TTS guidance text (Polly playback; Requirements 5.x / 13.x) ---
  OutboundGuidanceText:
    Type: String
    Default: "これは安否確認システムからのお電話です。災害発生に伴い、皆様の安否を確認しています。お名前と現在のご状況を、ピーという発信音の後にお話しください。終わりましたら電話を切ってください。"
    Description: アウトバウンド TTS ガイダンス本文（Polly で再生）

  InboundGuidanceText:
    Type: String
    Default: "これは安否確認システムからのお電話です。災害発生に伴い、皆様の安否を確認しています。お名前と現在のご状況を、ピーという発信音の後にお話しください。終わりましたら電話を切ってください。"
    Description: インバウンド TTS ガイダンス本文（ACTIVE_CYCLE 経路用、Polly で再生）

  # --- Log retention (Requirement 16.5; AWS Logs API allowed values only) ---
  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues:
      [
        1,
        3,
        5,
        7,
        14,
        30,
        60,
        90,
        120,
        150,
        180,
        365,
        400,
        545,
        731,
        1827,
        2192,
        2557,
        2922,
        3288,
        3653,
      ]
    Description: CloudWatch Logs 保持期間（日、AWS Logs API 許容値）

  # --- Operator notification (Requirements 14.5 / 14.6) ---
  OperatorEmail:
    Type: String
    Description: SNS 通知先 Email アドレス（運用者）

  # --- Recording / Transcript retention (Requirements 10.4 / 6.5: fixed 90 days) ---
  RecordingsRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [90]
    Description: 録音ファイル保管期間（要件 10.4 により 90 日固定）

  TranscriptsRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [90]
    Description: Transcript 保管期間（要件 6.5 により 90 日固定）

  # --- Inbound reception window (Requirements 13.5 / 13.6) ---
  InboundReceptionWindowDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 90
    Description: Cycle 完了後にインバウンド受付を継続する日数（1-90、既定 30）

  # --- Custom domain (optional; consumed by Conditions HasCustomDomain / UseCustomCert in Phase 1.4) ---
  DomainName:
    Type: String
    Default: ""
    Description: カスタムドメイン名（任意、空時は CloudFront 既定ドメイン）

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: ACM 証明書 ARN（任意、us-east-1 必要、CloudFront 用）

  # --- Route 53 hosted zone for SPA ALIAS record (optional; Phase 11.3) ---
  # Empty string means "do not create Route 53 RecordSet". When DomainName
  # is set but HostedZoneId is left empty, the CloudFront distribution
  # still uses the custom domain via Aliases, but DNS routing must be
  # configured outside this stack. See ADR-0007 for the ACM/DNS runbook.
  HostedZoneId:
    Type: String
    Default: ""
    AllowedPattern: "^(|Z[A-Z0-9]+)$"
    Description: Route 53 ホストゾーン ID（任意、空時は ALIAS レコード未作成、Phase 11.3）

  # --- Concurrency cap (Requirement 9.6: Connect Tokyo region quota = 10) ---
  MaxConcurrentCalls:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 10
    Description: Step Functions Map MaxConcurrency（同時発信上限、1-10）

  # --- Transcribe language (Requirement 6.2) ---
  TranscribeLanguageCode:
    Type: String
    Default: ja-JP
    AllowedValues: [ja-JP]
    Description: Amazon Transcribe 言語コード（ja-JP 固定）

  # --- Connect call-recording storage config gate (Phase 7.2) ---
  # ``AWS::Connect::InstanceStorageConfig`` for ``CALL_RECORDINGS`` can be
  # created at most once per Connect instance; if the externally-managed
  # instance already has a storage config of that type the resource fails
  # to create. We gate the resource with a Parameter (default ``false``)
  # so the template can be deployed without it. Flip to ``true`` once the
  # ADR-0005 課金合意 has descended and the operator has confirmed that
  # the instance has no pre-existing CALL_RECORDINGS storage config.
  ManageConnectStorageConfig:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: |
      CFn から Amazon Connect の CALL_RECORDINGS Storage Config を作成するか
      （Phase 7.2、既定 false）。true に切り替える前に、対象 Connect インスタンスに
      既存の CALL_RECORDINGS Storage Config が存在しないことを必ず確認すること。

  # --- Connect-native recording prefix (Phase 7.2) ---
  # Amazon Connect always appends ``/CallRecordings/<yyyy>/<mm>/<dd>/...``
  # to the BucketPrefix configured in InstanceStorageConfig. We point
  # Connect at the ``connect-raw/`` prefix so the design-mandated
  # ``recordings/`` / ``inbound/`` prefixes stay clear of the raw
  # uploads. The RecordingRelocator Lambda renames each raw recording
  # into the design layout and deletes the original.
  ConnectRecordingsPrefix:
    Type: String
    Default: "connect-raw/"
    AllowedPattern: "^[A-Za-z0-9._/-]+/$"
    Description: Connect が録音を書き出す S3 prefix（trailing slash 必須、Phase 7.2）

  # --- EmployeeApi anonymize salt (Phase 17.7: Secrets Manager 移行完了) ---
  # System-wide secret salt fed into the SHA-256 hash that scrubs past
  # Cycle Response rows when a GDPR-style personal-data deletion request
  # is received. The value is injected into EmployeeApiFn as the
  # ``EMPLOYEE_ANONYMIZE_SALT`` environment variable via CFn Dynamic
  # Reference to AWS Secrets Manager (see ``EmployeeApiFn`` resource).
  #
  # IMPORTANT: rotating this salt orphans every previously-anonymized
  # row by design (hashes from the old salt cannot be re-derived from
  # the new salt). Treat the value as long-lived. The salt is stored
  # in Secrets Manager at:
  #
  #     safety-confirmation/{env}/employee-anonymize-salt
  #     SecretString = {"salt": "<32-char value>"}
  #
  # For dev environment the secret is already created (Phase 17.7,
  # 2026-06-28). For stg / prod, the operator must create the secret
  # before deploying: see ``infrastructure/parameters/README.md`` §3.2.
  #
  # Phase 17.7 (2026-06-28 session 23) removed the previous
  # ``EmployeeAnonymizeSalt`` CFn Parameter and migrated to a Dynamic
  # Reference inside the Lambda Environment Variables. This change
  # avoids the CFn Parameter AllowedPattern validation issue that
  # blocked the initial migration attempt (session 22 γ-2).

  # --- Mock mode for Connect/Transcribe dev-only path (ADR-0010, Phase 16) ---
  # When ``true``, ConnectDispatcher / TranscribeStarter short-circuit the
  # real Amazon Connect / Transcribe APIs and instead produce deterministic
  # synthetic responses (see ADR-0010 §3.2). The intent is to validate the
  # outbound 1-pass E2E pipeline on the dev AWS account *before* a real
  # Connect instance is purchased.
  #
  # **Two-stage prod guard (ADR-0010 §3.4)**:
  #   1. The Lambda handlers compute the effective mock flag as
  #      ``MOCK_MODE=true AND ENVIRONMENT_NAME != "prod"`` — so even a
  #      misconfigured prod stack cannot accidentally execute the mock path.
  #   2. ``Rules.ProdMockModeForbidden`` (added in Phase 16.4) blocks any
  #      stack-create / update that combines ``EnvironmentName=prod`` with
  #      ``MockMode=true`` at the CFn API boundary.
  #
  # Default is ``"false"``: production behaviour. Flip to ``"true"`` only
  # in ``parameters/dev.json``.
  MockMode:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "false"
    Description: |
      ConnectDispatcher / TranscribeStarter mock mode（dev 専用、ADR-0010）。
      true にすると Connect / Transcribe 実 API を呼ばずに employeeId 末尾文字決定論
      で擬似応答を返す。prod へは必ず false を deploy すること（ADR-0010 §3.4 で
      Rules による 2 段防御あり）。dev 環境で Connect 購入前の Outbound 1 巡 E2E
      確認に使用する。

# ----- Mappings -----
# Phase 1.3: EnvMap defines per-environment differentials for dev/stg/prod.
# Only LogLevel / DynamoBillingMode / ApiThrottleRate / ApiThrottleBurst are mapped here.
# Names that embed ${EnvironmentName} (Cognito user pool name, S3 bucket names,
# DynamoDB table names, KMS alias) use !Sub instead and are NOT placed under Mappings.
Mappings:
  EnvMap:
    dev:
      LogLevel: INFO
      DynamoBillingMode: PAY_PER_REQUEST
      ApiThrottleRate: 50
      ApiThrottleBurst: 100
    stg:
      LogLevel: INFO
      DynamoBillingMode: PAY_PER_REQUEST
      ApiThrottleRate: 100
      ApiThrottleBurst: 200
    prod:
      LogLevel: WARN
      DynamoBillingMode: PAY_PER_REQUEST
      ApiThrottleRate: 100
      ApiThrottleBurst: 200

# ----- Conditions -----
# Phase 1.4: HasCustomDomain / UseCustomCert.
# Per Q3=A (grill-me session 2026-06-22), region constraint Conditions/Rules are out of scope;
# region restriction is delegated to the deploy script (Phase 15).
# Phase 15.27h (2026-06-28): IsProd Condition was removed. Requirement 17.3 mandates
# that environment-specific differences be expressed via Parameters or Mappings; no
# prod-only enhancement (PITR / DeletionProtection / Backup Policy / alarm thresholds)
# is required by current requirements.md or design.md. The previously-defined
# !Equals [!Ref EnvironmentName, prod] Condition had zero references across
# Resources / Outputs / other Conditions and was retired to satisfy cfn-lint W8001.
Conditions:
  # Phase 15.26: dev 環境限定リソース用 Condition。CLI 自動化基盤として
  # `ADMIN_USER_PASSWORD_AUTH` を許可するテスト App Client は dev 限定で
  # 作成する（パスワード平文を Auth Parameters に含むため stg / prod では
  # 作成不可）。stg / prod での誤作成を CFn 側で機構的に防止する。
  IsDev: !Equals [!Ref EnvironmentName, dev]
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]
  UseCustomCert: !Not [!Equals [!Ref AcmCertificateArn, ""]]
  # Phase 11.3: Route 53 ALIAS record gating.
  # HasHostedZoneId fires when HostedZoneId is non-empty. The combined
  # condition HasCustomDomainAndHostedZone (AND of HasCustomDomain and
  # HasHostedZoneId) gates the AWS::Route53::RecordSet resource — we
  # only create the ALIAS when BOTH a custom domain AND a hosted zone
  # are provided. CFn Conditions support !And of two operands directly,
  # so a separate intermediate Condition is unnecessary, but we name it
  # explicitly for readability at the RecordSet's Condition: line.
  HasHostedZoneId: !Not [!Equals [!Ref HostedZoneId, ""]]
  HasCustomDomainAndHostedZone:
    !And [!Condition HasCustomDomain, !Condition HasHostedZoneId]
  # Phase 7.2: gates the AWS::Connect::InstanceStorageConfig resource so
  # deployers can opt out when the externally-managed Connect instance
  # already has a CALL_RECORDINGS storage config (creation is one-per-
  # instance and would otherwise fail the stack update).
  ManageConnectStorageConfigCond:
    !Equals [!Ref ManageConnectStorageConfig, "true"]

# ----- Resources -----
# Phase 1.5: KMS Customer Managed Key (CMK) and Alias for application-wide envelope
# encryption. Key policy is intentionally minimal (root principal only) per ADR-0003.
# Phase 2.x will UpdateKeyPolicy to add kms:ViaService statements for dynamodb/s3.
# Phase 6.x will UpdateKeyPolicy to add Lambda/SFN/Transcribe execution role statements.
# Phase 2 onwards adds DynamoDB, S3 buckets, Cognito, Lambda, API Gateway, SFN, CloudFront,
# and observability resources.
Resources:
  # --- KMS Customer Managed Key (Requirements 6.4 / 10.3 / 15.1 / NFR3) ---
  # Symmetric ENCRYPT_DECRYPT key with annual automatic rotation.
  # Phase 1.5 scope: root principal only. See ADR-0003 for staged rollout rationale.
  KmsCmk:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "安否確認システム共用 KMS CMK（環境: ${EnvironmentName}）。DynamoDB / S3 / Lambda の包絡暗号化に使用。"
      KeySpec: SYMMETRIC_DEFAULT
      KeyUsage: ENCRYPT_DECRYPT
      EnableKeyRotation: true
      # Minimum 7-day pending window for cost minimization (see docs/notes/phase-1-5-kms-billing.md).
      PendingWindowInDays: 7
      KeyPolicy:
        Version: "2012-10-17"
        Id: !Sub "${EnvironmentName}-safety-confirmation-key-policy"
        Statement:
          - Sid: EnableIAMUserPermissions
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  # --- KMS Alias for the above CMK ---
  # Alias name format: alias/{env}-safety-confirmation (per tasks.md Phase 1.5).
  KmsCmkAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}-safety-confirmation"
      TargetKeyId: !Ref KmsCmk

  # --- Lambda common base ManagedPolicy (Phase 1.6; Requirements 15.2 / 16.1 / NFR3) ---
  # Per design.md / "ネットワーク・セキュリティ境界": "Lambda 実行ロールは関数単位で
  # 最小権限を付与し、DynamoDB / S3 / Connect / Transcribe / KMS への許可は対象 ARN を
  # 限定する。". This base ManagedPolicy provides only the CloudWatch Logs write
  # baseline that every Lambda execution role shares. Per-function roles created in
  # Phase 2+ attach this policy via ManagedPolicyArns and add their own resource-
  # scoped statements (DynamoDB / S3 / Connect / KMS / etc.).
  #
  # NOTE on trust policy: lambda.amazonaws.com への AssumeRole は IAM 仕様上 Role の
  # AssumeRolePolicyDocument に書く必要があり、ManagedPolicy には設定できない。よって
  # 本 ManagedPolicy には信頼ポリシーを含めない(各関数 Role 側で定義する)。
  #
  # Resource scoping: log group ARN は /aws/lambda/* のワイルドカードで本リージョン /
  # アカウントに限定する。AWS マネージドの AWSLambdaBasicExecutionRole 相当だが、
  # クロスリージョン *:*:* ではなく本リージョン / アカウントにスコープを絞る。
  LambdaBaseLogsManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${EnvironmentName}-safety-confirmation-lambda-base-logs"
      Description: !Sub "全 Lambda 共通 CloudWatch Logs 書込権限最小ポリシー (環境: ${EnvironmentName})。関数別 Role の ManagedPolicyArns で参照する基底ポリシー。"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCreateLogGroup
            Effect: Allow
            Action: logs:CreateLogGroup
            Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
          - Sid: AllowWriteLambdaLogStreams
            Effect: Allow
            Action:
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*:*"

  # --- Phase 12.3: Consolidated AuditLogGroup (Requirement 16.3) ---
  # Single CloudWatch LogGroup that consolidates audit records emitted by
  # auth_post_auth / auth_failure_reporter / dictionary_api / employee_api /
  # cycle_api / inbound_handler via ``shared.audit.logger.write_audit_log``.
  # Replaces the previous per-Lambda ``LOGGER.info(json.dumps(...))`` pattern;
  # downstream consumers (Athena / dashboards) get a single source of truth.
  AuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/safety-confirmation/audit-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  # --- Phase 12.3: ManagedPolicy granting write to AuditLogGroup only ---
  # Scoped resource = the AuditLogGroup ARN alone (no wildcard) so the 6
  # consumer Lambdas cannot write to other LogGroups via this policy. They
  # still hold the LambdaBaseLogsManagedPolicy for their own /aws/lambda/*
  # streams. Note ``logs:DescribeLogStreams`` is included because the
  # CloudWatch Logs SDK cold-start path calls it once before the first
  # CreateLogStream when the stream doesn't yet exist (see boto3 docs).
  AuditLogWriteManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${EnvironmentName}-safety-confirmation-audit-log-write"
      Description: !Sub "Phase 12.3: AuditLogGroup 書込権限 (環境: ${EnvironmentName})。auth / dictionary / employee / cycle / inbound 6 Lambda の Role で参照する。"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAuditLogWrite
            Effect: Allow
            Action:
              - logs:DescribeLogStreams
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !GetAtt AuditLogGroup.Arn

  # --- Phase 15.15: ManagedPolicy granting read of AuditLogGroup only ---
  # Scoped resource = the AuditLogGroup ARN alone (no wildcard) so the policy
  # cannot be used to read any other LogGroup. Intended for the information-
  # security / audit reviewer persona who runs CloudWatch Logs Insights
  # queries against the consolidated audit log (Requirement 16.3 / NFR3).
  #
  # A 採用方針（Task 15.15）: CFn が管理するのは ManagedPolicy のみで、
  # 監査担当者用 IAM User / Role / Group は本テンプレートでは作成しない。
  # IAM ライフサイクル (担当者の異動 / 退職に伴う付与 / 剥奪) を Cognito
  # User 管理サイクルから切り離すための意図的な分離である。運用時は本
  # Outputs (AuditReaderManagedPolicyArn) を参照して AWS Console / CLI で
  # IAM User / Role / Group に手動アタッチする。
  #
  # Action 7 件 = privacy.md §8.4 で従来から手書き例示していた読取系
  # アクションと一対一で対応する。書込側 (AuditLogWriteManagedPolicy) と
  # 命名対称: -write / -read。
  AuditReaderManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${EnvironmentName}-safety-confirmation-audit-log-read"
      Description: !Sub "Phase 15.15: AuditLogGroup 読取権限 (環境: ${EnvironmentName})。監査担当者の IAM User / Role / Group に AWS Console / CLI で手動アタッチして CloudWatch Logs Insights から閲覧させる。"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAuditLogRead
            Effect: Allow
            Action:
              - logs:GetLogEvents
              - logs:FilterLogEvents
              - logs:StartQuery
              - logs:StopQuery
              - logs:GetQueryResults
              - logs:DescribeLogStreams
              - logs:DescribeLogGroups
            Resource: !GetAtt AuditLogGroup.Arn

  # --- Phase 12.4: OperatorTopic (SNS) for operator notifications ---
  # CycleFinalizer (Phase 6.6) publishes SLA-warning / timeout notifications
  # to this topic. The Subscription below uses email protocol; the
  # subscriber must click the ConfirmSubscription link in the AWS-sent
  # email before any notifications are delivered (AWS standard behavior).
  OperatorTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "safety-confirmation-operator-${EnvironmentName}"
      DisplayName: !Sub "Safety Confirmation Operator (${EnvironmentName})"

  OperatorEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OperatorTopic
      Protocol: email
      Endpoint: !Ref OperatorEmail

  # ===== Phase 12.6: CloudWatch Alarms (Requirements 14.5 / 14.6 / 10.9 / 6.6) =====
  # 6 アラーム + 1 Metric Filter を OperatorTopic に通知する観測層。
  # AlarmActions に !Ref OperatorTopic を共通指定（DRY 原則・第 19 原則 a）。
  # 実 Publish + メール受信検証は Phase 14 統合テストへ委譲（OperatorEmail
  # がダミーアドレスのため、本タスクではテンプレ + デプロイ + 構成検証まで）。

  # --- (1) SLAWarning30MinAlarm (Requirement 14.5) ---
  # CycleFinalizer (Phase 6.6) が TIMER_30MIN trigger で
  # PutMetricData(Namespace=SafetyConfirmation, MetricName=SlaWarning30Min)
  # した時点で発火。初回発信完了率 100% 未達のサイクル検知。
  SLAWarning30MinAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "safety-confirmation-sla-warning-30min-${EnvironmentName}"
      AlarmDescription: "Cycle 起動から 30 分時点で初回発信完了率 100% 未達のサイクルが発生 (Requirement 14.5)"
      Namespace: SafetyConfirmation
      MetricName: SlaWarning30Min
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperatorTopic

  # --- (2) CycleTimeoutAlarm (Requirements 14.4 / 14.6) ---
  # CycleFinalizer (Phase 6.6) が TIMER_60MIN trigger で
  # PutMetricData(Namespace=SafetyConfirmation, MetricName=CycleTimeout)
  # した時点で発火。60 分以内に完了しなかったサイクル検知。
  CycleTimeoutAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "safety-confirmation-cycle-timeout-${EnvironmentName}"
      AlarmDescription: "Cycle が 60 分以内に完了せずタイムアウト確定 (Requirements 14.4 / 14.6)"
      Namespace: SafetyConfirmation
      MetricName: CycleTimeout
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperatorTopic

  # --- (3) LambdaErrorsAlarm (運用観測 / Requirement 14.5 系統) ---
  # AWS/Lambda Errors メトリクスを Dimensions なしで集約。アカウント内
  # 全 Lambda 関数のエラー合算で 5 分間に 5 件以上発火。関数の特定は
  # CloudWatch Logs Insights で別途トリアージ（運用効率優先）。
  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "safety-confirmation-lambda-errors-${EnvironmentName}"
      AlarmDescription: "いずれかの Lambda 関数で 5 分間に 5 件以上のエラー発生 (運用観測)"
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperatorTopic

  # --- (4) RecordingUploadFailureAlarm (Requirement 10.9) ---
  # Phase 12.5 RecordingMetadataWriterDLQ に Lambda 3 連敗時のメッセージが
  # 1 件でも入ったら発火。AWS/SQS NumberOfMessagesSent メトリクス使用。
  RecordingUploadFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "safety-confirmation-recording-upload-failure-${EnvironmentName}"
      AlarmDescription: "RecordingMetadataWriter が 3 連敗して DLQ にメッセージが滞留 (Requirement 10.9)"
      Namespace: AWS/SQS
      MetricName: NumberOfMessagesSent
      Dimensions:
        - Name: QueueName
          Value: !GetAtt RecordingMetadataWriterDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperatorTopic

  # --- (5) TranscribeFailedAlarm (Requirement 6.6) ---
  # TranscribeStarter Lambda (Phase 6.4) が 3 連敗で raise すると
  # AWS/Lambda Errors が +1 になる仕様。FunctionName Dimensions で
  # TranscribeStarterFn のみ抽出して 5 分間に 1 件以上で発火。
  TranscribeFailedAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "safety-confirmation-transcribe-failed-${EnvironmentName}"
      AlarmDescription: "Transcribe ジョブが 3 回連続失敗 (Requirement 6.6)"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref TranscribeStarterFn
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperatorTopic

  # --- (6) InboundUnauthorizedFilter + InboundUnauthorizedAlarm
  #         (Out of Scope 9 警戒 / brute force 可能性) ---
  # AuditLogGroup (Phase 12.3) に対する Metric Filter で
  # INBOUND_CONTACT_RECEIVED + flow=NOT_REGISTERED の audit ログを抽出。
  # 5 分間に 10 件以上発生したら発火 (未登録番号からの集中着信)。
  InboundUnauthorizedFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AuditLogGroup
      FilterName: !Sub "safety-confirmation-inbound-unauthorized-${EnvironmentName}"
      FilterPattern: '{ $.event = "INBOUND_CONTACT_RECEIVED" && $.flow = "NOT_REGISTERED" }'
      MetricTransformations:
        - MetricNamespace: SafetyConfirmation
          MetricName: InboundUnauthorized
          MetricValue: "1"
          DefaultValue: 0

  InboundUnauthorizedAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: InboundUnauthorizedFilter
    Properties:
      AlarmName: !Sub "safety-confirmation-inbound-unauthorized-${EnvironmentName}"
      AlarmDescription: "未登録番号からの inbound 着信が 5 分間に 10 件以上発生 (Out of Scope 9 警戒 / brute force 可能性)"
      Namespace: SafetyConfirmation
      MetricName: InboundUnauthorized
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref OperatorTopic

  # --- Phase 2.x: DynamoDB Tables and S3 Buckets ---
  # NOTE on KMS access at deploy time (empirically verified 2026-06-25):
  #   The CMK key policy allows only the account root principal (Phase 1.5
  #   baseline per ADR-0003 revised). Verified on 2026-06-25T00:44:10 UTC
  #   via `aws cloudformation update-stack` -> `UPDATE_COMPLETE`: IAM
  #   principals with kms:* (e.g., AdministratorAccess) successfully create
  #   SSE-KMS tables and SSE-KMS buckets via the AWS default key-policy
  #   behavior. The account-principal Statement acts as an IAM-policy
  #   delegation switch, and AdministratorAccess provides kms:CreateGrant
  #   which DynamoDB/S3 use to obtain a service grant on the CMK.
  #
  #   ADR-0003 stage 2 (formerly "Phase 2.x Key Policy extension") is
  #   therefore DEPRECATED. The new ADR-0003 stage 2 covers Phase 6.x
  #   (Lambda Role / SFN / Transcribe Statements), to be confirmed in the
  #   Phase 6 grill-me session.
  #
  #   See docs/decisions/0003-kms-cmk-staged-rollout.md (revised 2026-06-25)
  #   and docs/decisions/0004-handoff-notes-2026-06-25.md.

  # --- D1 Employee_Master (Phase 2.1; Requirements D1 / 13.2 / 15.1) ---
  # PK: employeeId (UUID v4). GSI PhoneNumberIndex (PK: phoneNumber) supports
  # Inbound_Handler caller-number lookup. SSE-KMS via project CMK, PITR ON.
  EmployeeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Employee-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: employeeId
          AttributeType: S
        - AttributeName: phoneNumber
          AttributeType: S
      KeySchema:
        - AttributeName: employeeId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: PhoneNumberIndex
          KeySchema:
            - AttributeName: phoneNumber
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D2 Cycle (Phase 2.2; Requirements D2 / 4.4 / 8.5) ---
  # PK: cycleId (UUID v4). GSI StatusStartedAtIndex (PK: status, SK: startedAt)
  # supports active-cycle lookup by status. SSE-KMS, PITR ON.
  CycleTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Cycle-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cycleId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: startedAt
          AttributeType: S
      KeySchema:
        - AttributeName: cycleId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: StatusStartedAtIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: startedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D3 Response (Phase 2.3; Requirements D3) ---
  # Composite key (cycleId + employeeId). Single PK query retrieves a whole
  # cycle's responses. SSE-KMS, PITR ON.
  #
  # Phase 7.2 addition: ``ContactIdIndex`` GSI (sparse — only rows where
  # ConnectDispatcher set ``contactId`` are indexed). Powers the
  # RecordingRelocator Lambda's contactId → (cycleId, employeeId,
  # callAttempts) lookup. ProjectionType=INCLUDE keeps the index
  # narrow: only the four attributes the relocator needs are projected.
  ResponseTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Response-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cycleId
          AttributeType: S
        - AttributeName: employeeId
          AttributeType: S
        - AttributeName: contactId
          AttributeType: S
      KeySchema:
        - AttributeName: cycleId
          KeyType: HASH
        - AttributeName: employeeId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: ContactIdIndex
          KeySchema:
            - AttributeName: contactId
              KeyType: HASH
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - cycleId
              - employeeId
              - callAttempts
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D4 Recording_Metadata (Phase 2.4; Requirements D4 / 10.5) ---
  # Stores per-call recording metadata. PK encodes outbound (cycleId) or
  # inbound (INBOUND#{contactId}) origin; SK encodes employeeId + sequence
  # (e.g., `{employeeId}#001` for outbound or `{employeeId}#INBOUND` for
  # inbound). SSE-KMS, PITR ON. No GSI.
  RecordingMetaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "RecordingMetadata-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cycleId
          AttributeType: S
        - AttributeName: employeeIdSeq
          AttributeType: S
      KeySchema:
        - AttributeName: cycleId
          KeyType: HASH
        - AttributeName: employeeIdSeq
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D6 TranscriptMetadata (Phase 2.5; Requirements D6 / 6.3) ---
  # Metadata for Amazon Transcribe jobs and resulting Transcript files in S3.
  # PK / SK structure mirrors RecordingMetadata so inbound and outbound flows
  # can correlate Recording <-> Transcript pairs by composite key. The
  # Transcript file bodies (S3 objects) are provisioned separately in
  # Phase 2.11 (TranscriptsBucket).
  TranscriptMetaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "TranscriptMetadata-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: cycleId
          AttributeType: S
        - AttributeName: employeeIdSeq
          AttributeType: S
      KeySchema:
        - AttributeName: cycleId
          KeyType: HASH
        - AttributeName: employeeIdSeq
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D7 KeywordDictionary (Phase 2.6; Requirements D7 / 8.2 / 8.3) ---
  # Stores keyword entries grouped by category (SAFE / INJURED / UNAVAILABLE).
  # A special META record (category=META, keyword=META) holds currentVersion
  # for atomic version increments via ConditionExpression. SSE-KMS, PITR ON.
  KeywordDictionaryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "KeywordDictionary-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: category
          AttributeType: S
        - AttributeName: keyword
          AttributeType: S
      KeySchema:
        - AttributeName: category
          KeyType: HASH
        - AttributeName: keyword
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D7 履歴 KeywordDictionaryHistory (Phase 2.7; Requirements D7 / 8.5 / 19) ---
  # Snapshot table for keyword dictionary versioning. On every dictionary CRUD,
  # the entire current dictionary is snapshotted under a new version number.
  # Cycle.dictionaryVersion references a row here to reproduce historical
  # dictionary state when matching keywords. PK is numeric (N) for version
  # ordering. SSE-KMS, PITR ON.
  KeywordDictionaryHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "KeywordDictionaryHistory-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: version
          AttributeType: N
        - AttributeName: categoryKeyword
          AttributeType: S
      KeySchema:
        - AttributeName: version
          KeyType: HASH
        - AttributeName: categoryKeyword
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D8 Inbound_Contact (Phase 2.8; Requirements D8 / 13.7) ---
  # Stores incoming-call records from Amazon Connect Inbound Contact Flow.
  # GSI EmployeeReceivedAtIndex (employeeId + receivedAt) supports per-employee
  # history listing. callerNumber is KMS-encrypted at the application layer
  # (column-level), in addition to table-level SSE-KMS. SSE-KMS, PITR ON.
  InboundContactTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "InboundContact-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: contactId
          AttributeType: S
        - AttributeName: employeeId
          AttributeType: S
        - AttributeName: receivedAt
          AttributeType: S
      KeySchema:
        - AttributeName: contactId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmployeeReceivedAtIndex
          KeySchema:
            - AttributeName: employeeId
              KeyType: HASH
            - AttributeName: receivedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- Lockout (Phase 2.9; Requirements 1.6, Property 8) ---
  # Authentication-failure history for Cognito PreAuthentication Trigger
  # (5-failures-in-30-minutes lockout policy). TTL attribute `expireAt`
  # (Unix epoch seconds) auto-evicts old entries. SSE-KMS, PITR ON.
  LockoutTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "Lockout-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userIdentifier
          AttributeType: S
      KeySchema:
        - AttributeName: userIdentifier
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expireAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !Ref KmsCmk
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- D5 Recordings Bucket (Phase 2.10; Requirements 10.2-10.4, 10.6) ---
  # Stores call recordings exported from Amazon Connect. SSE-KMS via project
  # CMK. Lifecycle deletes objects after 90 days (Requirement 10.4).
  # EventBridge Notification fires on object create for the Phase 8
  # TranscribeStarter Lambda. BucketPolicy (Lambda-Role-only Deny) is
  # implemented below via :ref:`RecordingsBucketPolicy` (Phase 2.10 / 6.x
  # で IAM Roles 確定後に追加済、Phase 17.6 で「Phase 6 once Lambda
  # execution roles exist」のレガシーコメントを整地、2026-06-28 セッション 22)。
  RecordingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "safety-confirmation-recordings-${EnvironmentName}-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsCmk
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteRecordingsAfter90Days
            Status: Enabled
            ExpirationInDays: !Ref RecordingsRetentionDays
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  # --- D6 Transcripts Bucket (Phase 2.11; Requirements 6.4-6.5, NFR3) ---
  # Stores Amazon Transcribe output JSON files. SSE-KMS via project CMK.
  # Lifecycle deletes objects after 90 days (Requirement 6.5).
  # EventBridge Notification fires on object create for the Phase 8
  # KeywordMatcher Lambda. BucketPolicy は :ref:`TranscriptsBucketPolicy`
  # で同 IAM Role に絞り込み済（Phase 17.6 で「Phase 6 で追加」のレガシー
  # コメントを整地、2026-06-28 セッション 22）。
  TranscriptsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "safety-confirmation-transcripts-${EnvironmentName}-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref KmsCmk
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteTranscriptsAfter90Days
            Status: Enabled
            ExpirationInDays: !Ref TranscriptsRetentionDays
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true

  # --- SPA Bucket (Phase 2.11; Requirements 6.4-6.5, NFR3) ---
  # Hosts the static SPA distributed by CloudFront via Origin Access Control.
  # SSE-S3 (AES256) — not SSE-KMS — because OAC currently has limitations
  # with KMS-encrypted objects, and the SPA artifacts are public-readable
  # in nature once served by CloudFront. Versioning ON for rollback.
  # ``NoncurrentVersionExpirationInDays`` は Phase 11 grill-me 後に 30 日で確定。
  # ``BucketPolicy`` (OAC-only access) は CloudFront / OAC 作成済の Phase 11
  # 完了時点で :ref:`SpaBucketPolicy` として追加済（Phase 17.6 で「Phase 11
  # once the CloudFront distribution and OAC exist」のレガシーコメントを整地、
  # 2026-06-28 セッション 22）。
  SpaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "safety-confirmation-spa-${EnvironmentName}-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldSpaVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  # --- Cognito User Pool (Phase 3.1; Requirements 1.1, 1.2) ---
  # Administrator-only authentication per Requirement 1.9 (Employee role is
  # explicitly NOT created). Self sign-up disabled (admin-create-user only).
  # Username = email (email is auto-required by UsernameAttributes). The
  # `name` attribute is required via Schema. Password policy is 12+ chars
  # with upper/lower/digit/symbol per Requirement 1.2. MFA is OFF for the
  # initial build. Token validity (ID 1h / Access 1h / Refresh 30d) is set
  # on the App Client in Phase 3.2 (Cognito UserPool itself has no token
  # validity property). Lambda Triggers (PreAuth / PostAuth / PreSignUp)
  # are wired in Phase 3.6 once the function resources exist; the Cognito
  # UserPool here intentionally has no `LambdaConfig` block.
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "safety-confirmation-${EnvironmentName}"
      # InviteMessageTemplate: Japanese admin invitation mail body.
      # Consumed by ``cognito-idp.admin_create_user`` when the SPA
      # registers a new admin via POST /employees (Req 2.1 revised).
      # ``{####}`` (mandatory) is replaced by Cognito with the
      # temporary password; ``{username}`` is replaced with the
      # Cognito username (= email). The login URL is injected per
      # environment: custom domain when HasCustomDomain, otherwise
      # the CloudFront distribution domain (*.cloudfront.net).
      # NOTE (Phase 15.22): CFn drift detection does NOT compare
      # AdminCreateUserConfig fields. Post-deploy verification is
      # via ``infrastructure/scripts/verify-cognito.ps1``.
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: "【安否確認システム】管理者アカウントを発行しました"
          EmailMessage: !Sub
            - |-
              このメールは安否確認システムの管理者アカウント発行のお知らせです。<br>
              <br>
              下記の情報でシステムにログインしてください。<br>
              <br>
              ログイン URL: ${LoginUrl}<br>
              ユーザー名: {username}<br>
              一時パスワード: {####}<br>
              <br>
              初回ログイン時にパスワード変更を求められます。<br>
              新しいパスワードは 12 文字以上、大文字・小文字・数字・記号を全て含む必要があります。<br>
              <br>
              心当たりがない場合は、このメールを破棄してください。<br>
              <br>
              ------<br>
              本メールは自動送信です。返信されても対応できません。
            - LoginUrl: !If
                - HasCustomDomain
                - !Sub "https://${DomainName}/"
                - !Sub "https://${SpaDistribution.DomainName}/"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      MfaConfiguration: "OFF"
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: name
          AttributeDataType: String
          Required: true
          Mutable: true
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: admin_only
            Priority: 1
      UserPoolTags:
        Project: safety-confirmation
        Environment: !Ref EnvironmentName
      # Phase 3.6: Lambda Triggers. The three Lambda functions are
      # defined below in this template. CFn auto-resolves the order
      # (Lambda functions are created first, then this UserPool, then
      # the Permission resources that reference !GetAtt CognitoUserPool.Arn).
      LambdaConfig:
        PreAuthentication: !GetAtt AuthPreAuthFn.Arn
        PostAuthentication: !GetAtt AuthPostAuthFn.Arn
        PreSignUp: !GetAtt AuthPreSignUpFn.Arn

  # --- Cognito User Pool Client (Phase 3.2; Requirement 1.2) ---
  # SPA-facing public client (no Client Secret). Authentication flow is
  # USER_SRP_AUTH (secure SRP password-proof, no plaintext password leaves
  # the SPA) plus REFRESH_TOKEN_AUTH (silent re-issue from the long-lived
  # refresh token). Token validity per Requirement 1.2: ID 1h / Access 1h
  # / Refresh 30d. PreventUserExistenceErrors=ENABLED hides "user not
  # found" vs. "wrong password" distinction from the client to thwart
  # account-enumeration probes. EnableTokenRevocation=true permits the
  # global sign-out API to invalidate refresh tokens. Hosted UI is NOT
  # used (SPA renders its own login form), so CallbackURLs / OAuth flows
  # / Domain are intentionally omitted.
  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: !Sub "safety-confirmation-spa-${EnvironmentName}"
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      SupportedIdentityProviders:
        - COGNITO
      IdTokenValidity: 1
      AccessTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        IdToken: hours
        AccessToken: hours
        RefreshToken: days

  # --- Cognito User Pool Client (Test, Phase 15.26; dev 環境限定) ---
  # CLI 自動化基盤として `ADMIN_USER_PASSWORD_AUTH` を許可するテスト用
  # App Client。dev 環境 Cognito User Pool は本番 SPA と同じく SRP 認証のみ
  # を主経路とするが、AWS CLI 単独で IdToken を取得できる経路が無く（Salt
  # 投入後の placeholder ユーザは FORCE_CHANGE_PASSWORD 状態 = CLI ログイン
  # 不可、tomita ユーザのパスワードは口頭管理）、read-only curl 検証スクリプト
  # の自動化が困難という課題が 15-2a-placeholder-deploy §4.2 (i) / 15.6a §5
  # で記録されていた。本リソースは dev 限定（`Condition: IsDev`）で作成され、
  # stg / prod では作成されない。パスワード平文を Auth Parameters に含むため
  # 本番では不採用、dev 限定とする運用方針を CFn 側で機構的に保証する。
  CognitoUserPoolClientTest:
    Type: AWS::Cognito::UserPoolClient
    Condition: IsDev
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: !Sub "safety-confirmation-cli-test-${EnvironmentName}"
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      EnableTokenRevocation: true
      SupportedIdentityProviders:
        - COGNITO
      IdTokenValidity: 1
      AccessTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        IdToken: hours
        AccessToken: hours
        RefreshToken: days

  # --- Cognito User Pool Group: Administrator (Phase 3.3; Requirements 1.3, 1.9) ---
  # Administrator is the only group in this system. Per Requirement 1.9, the
  # Employee group is explicitly NOT created (no employee self-service UI,
  # no /me endpoints). Role enforcement is performed inside each API Lambda
  # by inspecting the `cognito:groups` claim on the JWT — Cognito Identity
  # Pool is NOT used, so `RoleArn` is intentionally omitted (RoleArn only
  # applies when federating to Identity Pool credentials).
  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      UserPoolId: !Ref CognitoUserPool
      GroupName: Administrator
      Description: 安否確認システム管理者ロール（Requirement 1.9 により Employee グループは作成しない）
      Precedence: 1

  # --- SharedLayer: backend/shared/ as a Lambda Layer (Phase 3.4) ---
  # AWS Lambda's Python runtime mounts Layer content under /opt/ and adds
  # /opt/python to PYTHONPATH. The staging directory referenced by
  # Content must therefore look like `python/<module_name>/...`.
  # `scripts/build_layer.ps1` produces this layout at
  # `infrastructure/build/layers/shared/python/shared/` before
  # `aws cloudformation package` zips and uploads it to S3.
  SharedLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "safety-confirmation-shared-${EnvironmentName}"
      Description: backend/shared/ — Pure helper functions consumed by application Lambdas
      Content: build/layers/shared/
      CompatibleArchitectures:
        - arm64
      CompatibleRuntimes:
        - python3.12

  # --- AuthPreAuthFn IAM Execution Role (Phase 3.4) ---
  # Read-only on LockoutTable (GetItem only, no UpdateItem). Writing the
  # NEW failure timestamp is the responsibility of the AuthFailureReporter
  # Lambda (Phase 5.6), which has a separate role with UpdateItem. The
  # split enforces least-privilege.
  #
  # KMS Decrypt is scoped via `kms:ViaService = dynamodb.<region>.amazonaws.com`
  # so this role can only use the CMK through the DynamoDB service, not
  # directly. This is a stepwise rollout of ADR-0003 stage 3 driven by
  # Phase 3.4's actual need; the full stage-3 grill-me remains scheduled
  # for Phase 6 once additional Lambdas appear.
  AuthPreAuthFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-auth-pre-auth-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: LockoutTableRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt LockoutTable.Arn
        - PolicyName: CmkDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- AuthPreAuthFn Lambda Function (Phase 3.4) ---
  # Cognito PreAuthentication Trigger that enforces account lockout per
  # Requirement 1.6 / Property 8. Reads LockoutTable.failedAts and raises
  # PermissionError when the last 5 failures are all within the 30-minute
  # window. Does NOT record new failures — see AuthFailureReporter (5.6).
  AuthPreAuthFnLogGroup:
    # LogGroup for AuthPreAuthFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-auth-pre-auth-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  AuthPreAuthFn:
    Type: AWS::Lambda::Function
    DependsOn: AuthPreAuthFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-auth-pre-auth-${EnvironmentName}"
      Description: Cognito PreAuthentication Trigger — account lockout judgement (Requirement 1.6)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/auth_pre_auth/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt AuthPreAuthFnExecutionRole.Arn
      Timeout: 5
      MemorySize: 512
      Environment:
        Variables:
          LOCKOUT_TABLE_NAME: !Ref LockoutTable
          LOCKOUT_THRESHOLD: "5"
          LOCKOUT_WINDOW_SECONDS: "1800"

  # --- AuthPostAuthFn IAM Execution Role (Phase 3.5) ---
  # Write-capable on LockoutTable (UpdateItem only) for clearing failedAts
  # on successful authentication. KMS GenerateDataKey is required in
  # addition to Decrypt because DynamoDB SSE-KMS uses envelope encryption
  # for new ciphertext on write.
  AuthPostAuthFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-auth-post-auth-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
        - !Ref AuditLogWriteManagedPolicy # Phase 12.3: AuditLogGroup 書込権限
      Policies:
        - PolicyName: LockoutTableUpdate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !GetAtt LockoutTable.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- AuthPostAuthFn Lambda Function (Phase 3.5) ---
  # Cognito PostAuthentication Trigger that runs on SUCCESSFUL auth and
  # (1) clears LockoutTable.failedAts (cancels any lingering history)
  # and (2) emits a JSON AUTH_SUCCESS audit line to its default
  # CloudWatch log group. NOTE: sourceIp is null per user decision (α,
  # session 6) — Cognito's PostAuth event payload omits IP, so Req 1.8
  # is not fully satisfied. Phase 12.3 will reroute audit lines into a
  # consolidated AuditLogGroup.
  AuthPostAuthFnLogGroup:
    # LogGroup for AuthPostAuthFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-auth-post-auth-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  AuthPostAuthFn:
    Type: AWS::Lambda::Function
    DependsOn: AuthPostAuthFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-auth-post-auth-${EnvironmentName}"
      Description: Cognito PostAuthentication Trigger — clear lockout history and emit AUTH_SUCCESS audit log
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/auth_post_auth/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt AuthPostAuthFnExecutionRole.Arn
      Timeout: 5
      MemorySize: 512
      Environment:
        Variables:
          LOCKOUT_TABLE_NAME: !Ref LockoutTable
          AUDIT_LOG_GROUP_NAME: !Ref AuditLogGroup # Phase 12.3

  # --- AuthPreSignUpFn IAM Execution Role (Phase 3.6) ---
  # Minimal role — only CloudWatch Logs. No DynamoDB / KMS access since
  # the PreSignUp gate is a pure event predicate on triggerSource.
  AuthPreSignUpFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-auth-pre-signup-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy

  # --- AuthPreSignUpFn Lambda Function (Phase 3.6) ---
  # Cognito PreSignUp Trigger — admin-only sign-up gate (Defense in Depth
  # over AdminCreateUserConfig.AllowAdminCreateUserOnly=true from Phase 3.1).
  # NOTE: Does NOT reference SharedLayer; the handler is self-contained
  # and has no `shared/` dependency, per tasks.md 3.6 "minimal".
  AuthPreSignUpFnLogGroup:
    # LogGroup for AuthPreSignUpFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-auth-pre-signup-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  AuthPreSignUpFn:
    Type: AWS::Lambda::Function
    DependsOn: AuthPreSignUpFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-auth-pre-signup-${EnvironmentName}"
      Description: Cognito PreSignUp Trigger — admin-only sign-up gate (Requirement 1.9)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/auth_pre_signup/
      Role: !GetAtt AuthPreSignUpFnExecutionRole.Arn
      Timeout: 5
      MemorySize: 512

  # --- Lambda Invoke Permissions for Cognito (Phase 3.6) ---
  # Cognito requires an explicit lambda:InvokeFunction permission per
  # Trigger function, scoped by SourceArn to the specific User Pool.
  # CFn resolves the dependency order automatically: Lambdas first, then
  # CognitoUserPool, then these Permissions.
  AuthPreAuthFnCognitoPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthPreAuthFn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  AuthPostAuthFnCognitoPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthPostAuthFn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  AuthPreSignUpFnCognitoPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AuthPreSignUpFn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt CognitoUserPool.Arn

  # --- DictionaryApi IAM Execution Role (Phase 4.1) ---
  # KeywordDictionary table requires full CRUD plus Scan (for /keyword-dictionary
  # GET-all). KeywordDictionaryHistory requires PutItem only (snapshot writer).
  # KMS access is scoped via kms:ViaService = dynamodb to enforce least-privilege
  # (ADR-0003 stage-3 limited rollout, mirroring AuthPostAuthFn pattern).
  DictionaryApiExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-dictionary-api-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
        - !Ref AuditLogWriteManagedPolicy # Phase 12.3: AuditLogGroup 書込権限
      Policies:
        - PolicyName: KeywordDictionaryCrud
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt KeywordDictionaryTable.Arn
                  - !GetAtt KeywordDictionaryHistoryTable.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- DictionaryApi Lambda Function (Phase 4.1) ---
  # Routes are dispatched internally by httpMethod + resource. API Gateway
  # Resource/Method/Integration definitions は本 Lambda ではなく Phase 5.x
  # で API Gateway 側に集約済（Phase 5.7 RestApi Resource/Method/Stage 統合、
  # Phase 17.6 で「they come in Phase 5.x ... once the Method is added in
  # Phase 5 the wiring is one-shot」のレガシーコメントを整地、2026-06-28
  # セッション 22）。本 Lambda は API-Gateway-Proxy-event 形式で受信し、
  # Phase 5.7 で完了済 Method から one-shot で配線されている。
  # Timeout is 30s (longer than auth lambdas) to absorb full table Scan
  # latency on the GET /keyword-dictionary endpoint.
  DictionaryApiFnLogGroup:
    # LogGroup for DictionaryApiFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-dictionary-api-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  DictionaryApiFn:
    Type: AWS::Lambda::Function
    DependsOn: DictionaryApiFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-dictionary-api-${EnvironmentName}"
      Description: KeywordDictionary CRUD with optimistic-lock versioning (Requirements 8.1-8.7)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/dictionary_api/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt DictionaryApiExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          KEYWORD_DICT_TABLE_NAME: !Ref KeywordDictionaryTable
          KEYWORD_DICT_HISTORY_TABLE_NAME: !Ref KeywordDictionaryHistoryTable
          AUDIT_LOG_GROUP_NAME: !Ref AuditLogGroup # Phase 12.3

  # --- EmployeeApi IAM Execution Role (Phase 5.2) ---
  # Employee table full CRUD (incl. PhoneNumberIndex GSI Query for the
  # duplicate-phone check) plus TransactWriteItems for CSV import.
  # Cognito admin user management is scoped to this project's UserPool —
  # POST /employees with `isAdmin: true` creates a Cognito user before
  # the DynamoDB write (Requirement 2.2). KMS Decrypt/GenerateDataKey
  # is needed because Employee table is SSE-KMS.
  EmployeeApiExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-employee-api-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
        - !Ref AuditLogWriteManagedPolicy # Phase 12.3: AuditLogGroup 書込権限
      Policies:
        - PolicyName: EmployeeTableCrud
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:TransactWriteItems
                Resource:
                  - !GetAtt EmployeeTable.Arn
                  - !Sub "${EmployeeTable.Arn}/index/*"
        # Task 15.12: Cycle table Scan (enumerate cycleIds) + Response
        # table Query / PutItem / DeleteItem / TransactWriteItems
        # (anonymize past Cycle Response rows on personal-data request).
        # Scoped to the two tables — the Lambda must NOT write
        # other tables here.
        - PolicyName: CycleResponseAnonymizeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                Resource:
                  - !GetAtt CycleTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:TransactWriteItems
                Resource:
                  - !GetAtt ResponseTable.Arn
                  - !Sub "${ResponseTable.Arn}/index/*"
        - PolicyName: CognitoAdminUserManagement
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminDeleteUser
                Resource: !GetAtt CognitoUserPool.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- EmployeeApi Lambda Function (Phase 5.2) ---
  # I/O-heavy on the CSV-import path (up to 300 rows / 12 transact
  # batches, plus per-row PhoneNumberIndex pre-check), so MemorySize is
  # 1024 MB and Timeout is 60 s — matching design.md's "CSV 60 sec"
  # entry in the Lambda table.
  EmployeeApiFnLogGroup:
    # LogGroup for EmployeeApiFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-employee-api-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  EmployeeApiFn:
    Type: AWS::Lambda::Function
    DependsOn: EmployeeApiFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-employee-api-${EnvironmentName}"
      Description: Employee master CRUD + CSV import (Requirements 2, 3)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/employee_api/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt EmployeeApiExecutionRole.Arn
      Timeout: 60
      MemorySize: 1024
      Environment:
        Variables:
          EMPLOYEE_TABLE_NAME: !Ref EmployeeTable
          COGNITO_USER_POOL_ID: !Ref CognitoUserPool
          ADMIN_GROUP_NAME: !Ref AdminGroup
          AUDIT_LOG_GROUP_NAME: !Ref AuditLogGroup # Phase 12.3
          # Task 15.12: Cycle / Response tables for the anonymize handler.
          CYCLE_TABLE_NAME: !Ref CycleTable
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          # Phase 17.7 (2026-06-28 session 23): salt is now sourced from
          # AWS Secrets Manager via a Dynamic Reference resolved at CFn
          # deploy time. The Lambda runtime still reads the plain-text
          # value from this environment variable (handler.py L660). The
          # Lambda execution role does NOT need
          # ``secretsmanager:GetSecretValue`` permission because CFn
          # resolves the reference during stack update and injects the
          # plain text into the function configuration.
          #
          # For each environment (dev / stg / prod), the operator must
          # create a Secrets Manager secret at:
          #     safety-confirmation/{env}/employee-anonymize-salt
          # with the JSON body {"salt": "<32-char value>"} before the
          # first stack deploy. See parameters/README.md §3.2 for the
          # creation runbook. The dev secret is already created (Phase
          # 17.7, 2026-06-28); stg / prod secrets must be created
          # before their respective first deploy.
          EMPLOYEE_ANONYMIZE_SALT: !Sub "{{resolve:secretsmanager:safety-confirmation/${EnvironmentName}/employee-anonymize-salt:SecretString:salt}}"

  # --- CycleApi IAM Execution Role (Phase 5.3) ---
  # Cycle table CRUD (incl. StatusStartedAtIndex Query for the existing-
  # RUNNING check), KeywordDictionary GetItem for the META.currentVersion
  # snapshot, SFN StartExecution scoped to the Phase 6 StateMachine
  # forward-named ARN. KMS via DynamoDB.
  CycleApiExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-cycle-api-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
        - !Ref AuditLogWriteManagedPolicy # Phase 12.3: AuditLogGroup 書込権限
      Policies:
        - PolicyName: CycleTableCrud
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt CycleTable.Arn
                  - !Sub "${CycleTable.Arn}/index/*"
        - PolicyName: KeywordDictionaryRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: !GetAtt KeywordDictionaryTable.Arn
        - PolicyName: SfnStartExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StartExecution
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:safety-confirmation-cycle-${EnvironmentName}"
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- CycleApi Lambda Function (Phase 5.3) ---
  # SFN_STATE_MACHINE_ARN is forward-named to match the eventual Phase 6
  # state machine. The Lambda deploys cleanly now; StartExecution calls
  # will fail (ResourceNotFoundException) until Phase 6 creates the
  # machine with the matching name. Timeout 15s per design.md Lambda table.
  CycleApiFnLogGroup:
    # LogGroup for CycleApiFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-cycle-api-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  CycleApiFn:
    Type: AWS::Lambda::Function
    DependsOn: CycleApiFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-cycle-api-${EnvironmentName}"
      Description: Cycle creation + status retrieval (Requirements 4.1-4.11)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/cycle_api/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt CycleApiExecutionRole.Arn
      Timeout: 15
      MemorySize: 512
      Environment:
        Variables:
          CYCLE_TABLE_NAME: !Ref CycleTable
          KEYWORD_DICT_TABLE_NAME: !Ref KeywordDictionaryTable
          SFN_STATE_MACHINE_ARN: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:safety-confirmation-cycle-${EnvironmentName}"
          AUDIT_LOG_GROUP_NAME: !Ref AuditLogGroup # Phase 12.3
          # Phase 15.27a: Cycle Retry defaults sourced from CFn Parameters
          # so deployments can override via parameters/{env}.json without
          # touching code. handler reads via os.environ; body fields
          # override per request (backward compatible).
          DEFAULT_RETRY_COUNT: !Ref DefaultRetryCount
          DEFAULT_RETRY_INTERVAL_MINUTES: !Ref DefaultRetryIntervalMinutes

  # --- ResponseApi IAM Execution Role (Phase 5.4) ---
  # Read-only on Response (Query), Employee (GetItem for name resolution),
  # and TranscriptMetadata (Query for the latest excerpt). KMS via DynamoDB
  # for read decryption.
  ResponseApiExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-response-api-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: ResponseTablesRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt ResponseTable.Arn
                  - !GetAtt EmployeeTable.Arn
                  - !GetAtt TranscriptMetaTable.Arn
        - PolicyName: CmkDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- ResponseApi Lambda Function (Phase 5.4) ---
  ResponseApiFnLogGroup:
    # LogGroup for ResponseApiFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-response-api-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  ResponseApiFn:
    Type: AWS::Lambda::Function
    DependsOn: ResponseApiFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-response-api-${EnvironmentName}"
      Description: Read-only response history with transcript excerpts (Requirement 12.1)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/response_api/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt ResponseApiExecutionRole.Arn
      Timeout: 10
      MemorySize: 512
      Environment:
        Variables:
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          EMPLOYEE_TABLE_NAME: !Ref EmployeeTable
          TRANSCRIPT_META_TABLE_NAME: !Ref TranscriptMetaTable

  # --- RecordingApi IAM Execution Role (Phase 5.5) ---
  # Read-only on Cycle / InboundContact tables (for the 90-day check
  # reference timestamps) plus s3:GetObject on the recordings and
  # transcripts buckets. KMS Decrypt is needed for SSE-KMS on both
  # DynamoDB tables AND the S3 buckets (kms:ViaService allow-list).
  RecordingApiExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-recording-api-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: RecordingRelatedRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt CycleTable.Arn
                  - !GetAtt InboundContactTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "${RecordingsBucket.Arn}/*"
                  - !Sub "${TranscriptsBucket.Arn}/*"
        - PolicyName: CmkDecryptViaDynamoDBAndS3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService:
                      - !Sub "dynamodb.${AWS::Region}.amazonaws.com"
                      - !Sub "s3.${AWS::Region}.amazonaws.com"

  # --- RecordingApi Lambda Function (Phase 5.5) ---
  RecordingApiFnLogGroup:
    # LogGroup for RecordingApiFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-recording-api-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  RecordingApiFn:
    Type: AWS::Lambda::Function
    DependsOn: RecordingApiFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-recording-api-${EnvironmentName}"
      Description: Presigned URL issuance with 90-day expiry guard (Requirement 10.7 / 13.7 / Property 23)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/recording_api/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt RecordingApiExecutionRole.Arn
      Timeout: 5
      MemorySize: 512
      Environment:
        Variables:
          CYCLE_TABLE_NAME: !Ref CycleTable
          INBOUND_TABLE_NAME: !Ref InboundContactTable
          RECORDINGS_BUCKET_NAME: !Ref RecordingsBucket
          TRANSCRIPTS_BUCKET_NAME: !Ref TranscriptsBucket

  # --- AuthFailureReporter IAM Execution Role (Phase 5.6) ---
  # UpdateItem-only on LockoutTable (list_append failedAts + expireAt).
  # KMS Encrypt/Decrypt via DynamoDB for SSE-KMS writes.
  AuthFailureReporterExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-auth-failure-reporter-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
        - !Ref AuditLogWriteManagedPolicy # Phase 12.3: AuditLogGroup 書込権限
      Policies:
        - PolicyName: LockoutTableUpdate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !GetAtt LockoutTable.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- AuthFailureReporter Lambda Function (Phase 5.6) ---
  # PUBLIC endpoint per design (Cognito has no failure Trigger). API
  # Gateway throttling at the Method level (Phase 5 final integration)
  # constrains abuse. Phase 13.x PBT validates the failure-time append
  # semantics indirectly via Property 8 (is_locked) tests.
  AuthFailureReporterFnLogGroup:
    # LogGroup for AuthFailureReporterFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-auth-failure-reporter-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  AuthFailureReporterFn:
    Type: AWS::Lambda::Function
    DependsOn: AuthFailureReporterFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-auth-failure-reporter-${EnvironmentName}"
      Description: Public API for SPA-driven auth-failure recording (Requirement 1.6 - record side)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/auth_failure_reporter/
      Role: !GetAtt AuthFailureReporterExecutionRole.Arn
      Timeout: 5
      MemorySize: 512
      Environment:
        Variables:
          LOCKOUT_TABLE_NAME: !Ref LockoutTable
          LOCKOUT_WINDOW_SECONDS: "1800"
          AUDIT_LOG_GROUP_NAME: !Ref AuditLogGroup # Phase 12.3

  # --- LoadTargets IAM Execution Role (Phase 6.1) ---
  # Employee table: Scan (mode=ALL full enumeration) + BatchGetItem
  # (mode=UNREACHABLE_ONLY id dereference). Response table: Query against
  # the referencedCycleId partition to harvest UNREACHABLE/OTHER rows.
  # KMS Decrypt + GenerateDataKey via DynamoDB only (no S3 / other
  # services) per requirements 4.3-4.5 / 13.5.
  LoadTargetsFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-load-targets-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: EmployeeTableRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                Resource: !GetAtt EmployeeTable.Arn
        - PolicyName: ResponseTableRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !GetAtt ResponseTable.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- LoadTargets Lambda Function (Phase 6.1) ---
  # First state of the Cycle Step Functions state machine. Enumerates
  # employees per the mode parameter. Timeout 30s per design.md
  # "Lambda 関数一覧" table. The Lambda deploys cleanly now; SFN invocation
  # is wired in Phase 6.8.
  LoadTargetsFnLogGroup:
    # LogGroup for LoadTargetsFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-load-targets-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  LoadTargetsFn:
    Type: AWS::Lambda::Function
    DependsOn: LoadTargetsFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-load-targets-${EnvironmentName}"
      Description: Enumerate cycle target employees (Requirements 4.3-4.5, 13.5, Property 2)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/load_targets/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt LoadTargetsFnExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          EMPLOYEE_TABLE_NAME: !Ref EmployeeTable
          RESPONSE_TABLE_NAME: !Ref ResponseTable

  # --- ConnectDispatcher IAM Execution Role (Phase 6.2) ---
  # Permissions required for one Connect outbound dispatch:
  #   1. connect:StartOutboundVoiceContact, scoped to the externally
  #      provided outbound phone number ARN (Requirement 5.1).
  #   2. dynamodb:UpdateItem on Response, for both the success path
  #      (record contactId + dispatchedAt) and the exhaustion path
  #      (callResultCode=ERROR with ConditionExpression).
  #   3. states:SendTaskSuccess / SendTaskFailure on the Phase 6.8
  #      forward-named state machine, for releasing the waitForTaskToken
  #      after all dispatch retries are exhausted.
  #   4. kms:Decrypt / GenerateDataKey via DynamoDB only, mirroring the
  #      LoadTargets / CycleApi pattern (ADR-0003 stage 3 limited
  #      rollout). Re-evaluated in the Phase 6 grill-me.
  ConnectDispatcherFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-connect-dispatcher-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: ConnectStartOutboundVoiceContact
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - connect:StartOutboundVoiceContact
                Resource: !Ref ConnectOutboundPhoneNumberArn
        - PolicyName: ResponseTableUpdate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !GetAtt ResponseTable.Arn
        - PolicyName: SfnSendTaskOutcome
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:SendTaskSuccess
                  - states:SendTaskFailure
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:safety-confirmation-cycle-${EnvironmentName}"
        # Mock-mode only (ADR-0010 §3.5.1 Phase 16.2). The grant is present in
        # all environments because IAM policies cannot be conditionalised on a
        # runtime env var; the actual PutObject call is gated by the handler's
        # MOCK_MODE check, and ``Rules.ProdMockModeForbidden`` (Phase 16.4)
        # blocks the prod-stack-with-MockMode=true combination at the CFn API
        # boundary as a second defence layer.
        - PolicyName: RecordingsBucketMockWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "${RecordingsBucket.Arn}/recordings/*"
        - PolicyName: CmkEncryptDecryptViaDynamoDBAndS3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService:
                      - !Sub "dynamodb.${AWS::Region}.amazonaws.com"
                      - !Sub "s3.${AWS::Region}.amazonaws.com"

  # --- ConnectDispatcher Lambda Function (Phase 6.2) ---
  # Invoked per Map iteration of the Cycle Step Functions state machine.
  # Initiates a single outbound call via Amazon Connect with up to 3
  # exponential-backoff retries on ThrottlingException /
  # LimitExceededException. Timeout 60s gives headroom for two
  # sleep-and-retry cycles plus the Connect API round-trip itself
  # (StartOutboundVoiceContact is fast but the worst-case
  # base*2^attempt clamp engages at 5s and we have two such sleeps).
  ConnectDispatcherFnLogGroup:
    # LogGroup for ConnectDispatcherFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-connect-dispatcher-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  ConnectDispatcherFn:
    Type: AWS::Lambda::Function
    DependsOn: ConnectDispatcherFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-connect-dispatcher-${EnvironmentName}"
      Description: Initiate one Connect outbound call (Requirements 5.1, 5.2, 9.6)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/connect_dispatcher/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt ConnectDispatcherFnExecutionRole.Arn
      Timeout: 60
      MemorySize: 512
      Environment:
        Variables:
          CONNECT_INSTANCE_ID: !Ref ConnectInstanceId
          OUTBOUND_CONTACT_FLOW_ID: !Ref OutboundContactFlowId
          OUTBOUND_PHONE_NUMBER: !Ref ConnectOutboundPhoneNumber
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          SFN_STATE_MACHINE_ARN: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:safety-confirmation-cycle-${EnvironmentName}"
          # ADR-0010 §3.4 Phase 16.2: mock mode env (dev-only synthetic outbound path).
          # Handler computes effective mock flag = MOCK_MODE=true AND ENVIRONMENT_NAME != "prod".
          MOCK_MODE: !Ref MockMode
          ENVIRONMENT_NAME: !Ref EnvironmentName
          # Mock-mode only: handler PutObject's a 1KB placeholder wav to
          # ``recordings/{cycleId}/{employeeId}/{seq}.wav`` to fire the existing
          # TranscribeStarterEventRule (ADR-0010 §3.5.1).
          RECORDINGS_BUCKET_NAME: !Ref RecordingsBucket

  # --- CallEndHandler IAM Execution Role (Phase 6.3) ---
  # Permissions required for the Outbound Contact Flow terminal Lambda:
  #   1. dynamodb:UpdateItem on Response, to set callResultCode + endedAt
  #      with ConditionExpression="attribute_not_exists(callResultCode)"
  #      for double-write protection.
  #   2. states:SendTaskSuccess / SendTaskFailure on the Phase 6.8
  #      forward-named state machine, releasing the waitForTaskToken
  #      set up by ConnectDispatcher (Phase 6.2).
  #   3. kms:Decrypt / GenerateDataKey via DynamoDB only, mirroring the
  #      6.1 / 6.2 pattern (ADR-0003 stage 3 limited rollout, full
  #      grill-me deferred).
  # Connect itself does not invoke this Role; Connect invokes the
  # Function via AWS::Lambda::Permission (below).
  CallEndHandlerFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-call-end-handler-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: ResponseTableUpdate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !GetAtt ResponseTable.Arn
        - PolicyName: SfnSendTaskOutcome
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:SendTaskSuccess
                  - states:SendTaskFailure
                Resource: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:safety-confirmation-cycle-${EnvironmentName}"
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- CallEndHandler Lambda Function (Phase 6.3) ---
  # Invoked from the terminal "Invoke AWS Lambda function" block of the
  # Outbound Contact Flow (Phase 7.1). Writes callResultCode + endedAt
  # to Response (ConditionExpression guards double-writes) and releases
  # the SFN Map iteration's waitForTaskToken with retry=False payload.
  # callAttempts is NOT incremented here — Phase 6.2 ConnectDispatcher
  # already does ADD callAttempts :one on successful dispatch.
  # Timeout 10s, Memory 512MB: I/O is one UpdateItem + one
  # SendTaskSuccess, neither is sleep-heavy.
  CallEndHandlerFnLogGroup:
    # LogGroup for CallEndHandlerFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-call-end-handler-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  CallEndHandlerFn:
    Type: AWS::Lambda::Function
    DependsOn: CallEndHandlerFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-call-end-handler-${EnvironmentName}"
      Description: Finalise one Connect outbound call (Requirements 5.4, 5.5)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/call_end_handler/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt CallEndHandlerFnExecutionRole.Arn
      Timeout: 10
      MemorySize: 512
      Environment:
        Variables:
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          SFN_STATE_MACHINE_ARN: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:safety-confirmation-cycle-${EnvironmentName}"

  # --- CallEndHandler Lambda Permission for Amazon Connect (Phase 6.3) ---
  # The Outbound Contact Flow's terminal "Invoke AWS Lambda function"
  # block calls this Function. AWS::Lambda::Permission grants the
  # connect.amazonaws.com service principal lambda:InvokeFunction,
  # scoped to this AWS account and this Connect instance ARN
  # (CFn-managed-out Parameter). SourceAccount + SourceArn together
  # mitigate the confused-deputy class of misuse.
  CallEndHandlerFnConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CallEndHandlerFn
      Action: lambda:InvokeFunction
      Principal: connect.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Ref ConnectInstanceArn

  # --- TranscribeStarter IAM Execution Role (Phase 6.4) ---
  # Permissions required for one Transcribe job dispatch triggered by the
  # RecordingsBucket EventBridge "Object Created" event:
  #   1. transcribe:StartTranscriptionJob / GetTranscriptionJob on "*" —
  #      Amazon Transcribe does not support ARN-level resource scoping
  #      on the job resource, so "*" is the documented least-privilege
  #      formulation (per AWS Service Authorization Reference).
  #   2. s3:GetObject on RecordingsBucket/* — Transcribe pulls the audio
  #      via its own service role, but Lambda Role coverage acts as a
  #      defence in depth if Phase 7 changes the source side.
  #   3. s3:PutObject + s3:PutObjectTagging on TranscriptsBucket/* —
  #      Transcribe writes the JSON output; Lambda Role coverage matches
  #      the pattern AWS recommends when OutputBucketName is set.
  #   4. dynamodb:PutItem on TranscriptMetaTable and dynamodb:UpdateItem
  #      on ResponseTable, for the success-path metadata write and the
  #      failure-path TRANSCRIBE_FAILED transition.
  #   5. kms:Decrypt / GenerateDataKey on the project CMK, scoped via
  #      kms:ViaService to dynamodb.<region>.amazonaws.com AND
  #      s3.<region>.amazonaws.com — two service principals are needed
  #      because both DynamoDB and S3 (Transcript output encryption)
  #      transit the CMK in this handler. Written as two Statements to
  #      keep the policy human-readable.
  TranscribeStarterFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-transcribe-starter-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: TranscribeStartJob
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - transcribe:StartTranscriptionJob
                  - transcribe:GetTranscriptionJob
                Resource: "*"
        - PolicyName: RecordingsBucketRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${RecordingsBucket.Arn}/*"
        - PolicyName: TranscriptsBucketWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub "${TranscriptsBucket.Arn}/*"
        # Mock-mode only (ADR-0010 §3.5.2 Phase 16.3). The grant is present in
        # all environments because IAM policies cannot be conditionalised on a
        # runtime env var; the actual PutObject call from the Lambda code path
        # is gated by the handler's MOCK_MODE check, and
        # ``Rules.ProdMockModeForbidden`` (Phase 16.4) blocks the
        # prod-stack-with-MockMode=true combination at the CFn API boundary as
        # a second defence layer. Scoping the Resource to
        # ``transcripts/*`` (production-shaped key prefix from
        # ``parse_recording_key``) keeps the blast radius limited even if a
        # mis-deployment flipped MOCK_MODE on outside prod.
        - PolicyName: TranscriptsBucketMockWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "${TranscriptsBucket.Arn}/transcripts/*"
        - PolicyName: TranscriptMetaPutAndResponseUpdate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt TranscriptMetaTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource: !GetAtt ResponseTable.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"
        - PolicyName: CmkEncryptDecryptViaS3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"

  # --- TranscribeStarter Lambda Function (Phase 6.4) ---
  # Triggered by EventBridge for S3 ``Object Created`` events on
  # RecordingsBucket (Phase 2.10 enabled NotificationConfiguration.
  # EventBridgeConfiguration on that bucket). Starts an Amazon
  # Transcribe job with retry on ThrottlingException /
  # LimitExceededException, writes metadata to TranscriptMetaTable, and
  # transitions Response.callResultCode RECORDED -> TRANSCRIBE_FAILED on
  # final failure for outbound recordings.
  # Timeout 30s gives headroom for two sleep-and-retry cycles plus the
  # Transcribe StartJob round-trip itself.
  TranscribeStarterFnLogGroup:
    # LogGroup for TranscribeStarterFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-transcribe-starter-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  TranscribeStarterFn:
    Type: AWS::Lambda::Function
    DependsOn: TranscribeStarterFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-transcribe-starter-${EnvironmentName}"
      Description: Start one Transcribe job from a Recordings ObjectCreated event (Requirements 6.1, 6.2, 6.6)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/transcribe_starter/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt TranscribeStarterFnExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          RECORDINGS_BUCKET_NAME: !Ref RecordingsBucket
          TRANSCRIPTS_BUCKET_NAME: !Ref TranscriptsBucket
          TRANSCRIPT_META_TABLE_NAME: !Ref TranscriptMetaTable
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          KMS_CMK_ARN: !GetAtt KmsCmk.Arn
          TRANSCRIBE_LANGUAGE_CODE: !Ref TranscribeLanguageCode
          # ADR-0010 §3.4 Phase 16.3: mock mode env (dev-only synthetic
          # transcript JSON path). Handler computes effective mock flag =
          # MOCK_MODE=true AND ENVIRONMENT_NAME != "prod", mirroring the
          # ConnectDispatcher pattern from Phase 16.2.
          MOCK_MODE: !Ref MockMode
          ENVIRONMENT_NAME: !Ref EnvironmentName

  # --- TranscribeStarter EventBridge Rule (Phase 6.4) ---
  # Matches S3 "Object Created" events for the RecordingsBucket only.
  # Phase 2.10 already enabled the EventBridgeConfiguration on that
  # bucket, so this Rule is the second half of the wire-up. Both
  # outbound (``recordings/{cycleId}/...``) and inbound
  # (``inbound/{yyyymm}/...``) prefixes flow through the same Rule;
  # branching is the handler's responsibility (parse_recording_key).
  #
  # Phase 7.2 update: the EventPattern now constrains
  # ``detail.object.key`` to keys starting with ``recordings/`` or
  # ``inbound/``. The Connect-native ``connect-raw/`` prefix
  # (introduced by Phase 7.2 InstanceStorageConfig) is excluded so
  # TranscribeStarter does not fire on the pre-relocation raw upload.
  # RecordingRelocator (Phase 7.2) re-writes the Connect-native key
  # to the design layout, and the resulting PutObject re-fires
  # EventBridge with the design-layout key which DOES match the
  # prefix filter — at which point TranscribeStarter picks it up.
  TranscribeStarterEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "safety-confirmation-recording-uploaded-${EnvironmentName}"
      Description: Fire TranscribeStarter when a design-layout recording lands in RecordingsBucket
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref RecordingsBucket
          object:
            key:
              - prefix: "recordings/"
              - prefix: "inbound/"
      Targets:
        - Id: TranscribeStarterFnTarget
          Arn: !GetAtt TranscribeStarterFn.Arn

  # --- TranscribeStarter Lambda Permission for EventBridge (Phase 6.4) ---
  # Grants the EventBridge service principal lambda:InvokeFunction on
  # the TranscribeStarter Function, scoped to the Rule above. Without
  # this Permission the Rule fires but the Lambda invocation is denied.
  TranscribeStarterFnEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TranscribeStarterFn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt TranscribeStarterEventRule.Arn

  # --- RetryEvaluator IAM Execution Role (Phase 6.5) ---
  # The Lambda is a pure compute wrapper over
  # ``shared.retry.evaluator`` — no DynamoDB, no Step Functions, no
  # KMS, no S3, no Connect. The SFN ``EvaluateRetry`` state passes
  # every input the function needs in the event payload. Therefore the
  # Role only needs the CloudWatch Logs baseline.
  RetryEvaluatorFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-retry-evaluator-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy

  # --- RetryEvaluator Lambda Function (Phase 6.5) ---
  # Invoked from the Step Functions ``EvaluateRetry`` state after each
  # outbound dispatch attempt to decide retry-vs-finalize. Implements
  # Property 12 (shouldRetry) and Property 13 (computeNextDispatchAt)
  # by delegating to the pure functions in
  # ``backend/shared/retry/evaluator.py`` (Phase 13.12 / 13.13 PBT
  # candidates). Timeout 5s is generous for what is a few arithmetic
  # operations plus ISO 8601 parsing.
  RetryEvaluatorFnLogGroup:
    # LogGroup for RetryEvaluatorFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-retry-evaluator-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  RetryEvaluatorFn:
    Type: AWS::Lambda::Function
    DependsOn: RetryEvaluatorFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-retry-evaluator-${EnvironmentName}"
      Description: Decide retry-vs-finalize for a Cycle/Employee pair (Requirements 9.1 / 9.3-9.5, Properties 12 / 13)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/retry_evaluator/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt RetryEvaluatorFnExecutionRole.Arn
      Timeout: 5
      MemorySize: 512

  # --- CycleFinalizer IAM Execution Role (Phase 6.6) ---
  # Invoked from the Step Functions ``Finalize`` state (MAP_COMPLETED)
  # and from two EventBridge timer rules (TIMER_30MIN / TIMER_60MIN).
  # The Lambda mutates Cycle / Response rows, calls SFN StopExecution
  # on the 60-min path, publishes operator notifications, emits a
  # CloudWatch metric, and deletes the per-cycle EventBridge rules. The
  # Role therefore needs the union of those permissions, each scoped to
  # the exact ARN pattern.
  #
  # Forward-named ARNs (Phase 12.4 OperatorTopic / Phase 6.8 SFN state
  # machine) are baked into the Resource lists today; both targets are
  # created later in the project with the matching name, at which point
  # this Role's grants come online automatically without re-deploy.
  #
  # ``cloudwatch:PutMetricData`` cannot be scoped to a Resource ARN per
  # AWS docs — ``Resource: "*"`` is the only valid value.
  CycleFinalizerFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-cycle-finalizer-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: CycleAndResponseTableAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt CycleTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource: !GetAtt ResponseTable.Arn
        - PolicyName: SfnStopExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - states:StopExecution
                # Phase 6.8 forward-named SFN state machine execution ARN.
                # ``execution:`` ARNs use the state-machine name in the
                # 6th segment; the trailing ``:*`` covers any execution id.
                Resource: !Sub
                  - "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:${SmName}:*"
                  - SmName: !Sub "safety-confirmation-cycle-${EnvironmentName}"
        - PolicyName: OperatorTopicPublish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                # Phase 12.4: OperatorTopic は同テンプレートで管理。
                # !Ref で論理参照することで forward-named ARN ハードコード
                # を撤去し、DRY 原則（第 19 原則 a）に準拠。
                Resource: !Ref OperatorTopic
        - PolicyName: CloudWatchPutMetric
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                # AWS docs: PutMetricData does not support Resource ARN
                # scoping; namespace scoping is applied via the request
                # itself (CLOUDWATCH_NAMESPACE env var).
                Resource: "*"
        - PolicyName: EventRuleDelete
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:DeleteRule
                  - events:RemoveTargets
                # Per-cycle rules created by Phase 6.8 StartTimers state
                # follow the ``cycle-30min-{cycleId}`` /
                # ``cycle-60min-{cycleId}`` naming convention. The
                # ``rule/cycle-*`` wildcard restricts deletion to that
                # family while keeping the policy stable across cycles.
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/cycle-*"
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- CycleFinalizer Lambda Function (Phase 6.6) ---
  # Multiplexes three trigger sources via ``event['trigger']``:
  # MAP_COMPLETED (Req 11.4), TIMER_30MIN (Req 14.5), TIMER_60MIN
  # (Req 14.4 / 14.6). Pure logic lives in ``shared.cycle.finalize``
  # (Property 15 / 16 / 17 PBT candidates).
  #
  # Timeout 30s + MemorySize 1024MB: the 60-min path performs Query +
  # one UpdateItem per non-terminal Response + SFN StopExecution + SNS
  # Publish + 2x EventBridge DeleteRule, so we budget for a 300-target
  # cycle's worth of round-trips.
  CycleFinalizerFnLogGroup:
    # LogGroup for CycleFinalizerFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-cycle-finalizer-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  CycleFinalizerFn:
    Type: AWS::Lambda::Function
    DependsOn: CycleFinalizerFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-cycle-finalizer-${EnvironmentName}"
      Description: Finalize a cycle on Map completion or 30/60-minute timer (Requirements 11.4, 14.4-14.6)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/cycle_finalizer/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt CycleFinalizerFnExecutionRole.Arn
      Timeout: 30
      MemorySize: 1024
      Environment:
        Variables:
          CYCLE_TABLE_NAME: !Ref CycleTable
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          OPERATOR_TOPIC_ARN: !Ref OperatorTopic
          SFN_STATE_MACHINE_ARN: !Sub
            - "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${SmName}"
            - SmName: !Sub "safety-confirmation-cycle-${EnvironmentName}"
          CLOUDWATCH_NAMESPACE: SafetyConfirmation

  # --- RecordingMetadataWriter DLQ (Phase 6.7 + Phase 12.5 先行実装) ---
  # SQS Dead Letter Queue for the RecordingMetadataWriter Lambda's
  # asynchronous (EventBridge) invocations. Phase 12.5 originally
  # scoped DLQ creation, but the wire-up only makes sense as a single
  # unit with the Lambda's DeadLetterConfig — so the queue ships in
  # this Phase 6.7 commit and Phase 12.5 records "Done When" against
  # the same resource. Retention 14 days (1,209,600 seconds) gives an
  # operator ample window to triage and re-drive failed metadata
  # writes. SQS-managed SSE keeps the messages encrypted at rest
  # without dragging the project CMK into the queue's IAM surface
  # (the messages are EventBridge payloads, not application data).
  RecordingMetadataWriterDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "safety-confirmation-recording-meta-dlq-${EnvironmentName}"
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  # --- RecordingMetadataWriter IAM Execution Role (Phase 6.7) ---
  # Permissions required for one RecordingMeta row write triggered by
  # the RecordingsBucket EventBridge "Object Created" event:
  #   1. dynamodb:PutItem on RecordingMetaTable — the only write the
  #      handler performs (idempotent via ConditionExpression).
  #   2. sqs:SendMessage on RecordingMetadataWriterDLQ — granted to
  #      the function's role even though the Lambda service performs
  #      the actual SendMessage on asynchronous-invocation failure.
  #      AWS Lambda's documented model requires the function role to
  #      have sqs:SendMessage on the DLQ target ARN (see
  #      "Asynchronous invocation" > "Dead-letter queues" in the
  #      Lambda Developer Guide).
  #   3. kms:Decrypt + GenerateDataKey on the project CMK, scoped via
  #      kms:ViaService to dynamodb.<region>.amazonaws.com — the only
  #      service principal that transits the CMK here, because the
  #      DLQ uses SQS-managed SSE rather than the project CMK.
  RecordingMetadataWriterFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-recording-meta-writer-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: RecordingMetaPut
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt RecordingMetaTable.Arn
        - PolicyName: DlqSendMessage
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt RecordingMetadataWriterDLQ.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- RecordingMetadataWriter Lambda Function (Phase 6.7) ---
  # Triggered by EventBridge for S3 ``Object Created`` events on
  # RecordingsBucket. Wired through a SEPARATE EventBridge Rule from
  # the Phase 6.4 TranscribeStarter Rule (responsibility isolation —
  # disabling one Rule for ops does not affect the other). Both Rules
  # share an EventPattern and fire concurrently for a single PutObject;
  # that is intentional and OK because each Lambda owns its own
  # DynamoDB row and the writes are idempotent (ConditionExpression).
  #
  # DeadLetterConfig hooks the Lambda's asynchronous-invocation error
  # path to ``RecordingMetadataWriterDLQ``. On any unhandled exception
  # — including ``_DdbWriteExhaustedError`` after 3 throttled retries —
  # Lambda forwards the original EventBridge event to the queue.
  RecordingMetadataWriterFnLogGroup:
    # LogGroup for RecordingMetadataWriterFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-recording-meta-writer-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  RecordingMetadataWriterFn:
    Type: AWS::Lambda::Function
    DependsOn: RecordingMetadataWriterFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-recording-meta-writer-${EnvironmentName}"
      Description: Write one RecordingMeta row from a Recordings ObjectCreated event (Requirements D4, 10.5)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/recording_metadata_writer/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt RecordingMetadataWriterFnExecutionRole.Arn
      Timeout: 15
      MemorySize: 512
      DeadLetterConfig:
        TargetArn: !GetAtt RecordingMetadataWriterDLQ.Arn
      Environment:
        Variables:
          RECORDINGS_BUCKET_NAME: !Ref RecordingsBucket
          RECORDING_META_TABLE_NAME: !Ref RecordingMetaTable

  # --- RecordingMetadataWriter EventBridge Rule (Phase 6.7) ---
  # Separate Rule from the Phase 6.4 TranscribeStarter Rule. Matches
  # S3 "Object Created" events for the RecordingsBucket only. Both
  # outbound and inbound recordings flow through the same Rule;
  # branching is the handler's responsibility (parse_recording_key).
  #
  # Phase 7.2 update: same prefix-filter as TranscribeStarter — only
  # design-layout (``recordings/`` / ``inbound/``) prefixes fire this
  # rule; the Connect-native ``connect-raw/`` prefix is handled by
  # RecordingRelocator first.
  RecordingMetadataWriterEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "safety-confirmation-recording-meta-uploaded-${EnvironmentName}"
      Description: Fire RecordingMetadataWriter when a design-layout recording lands in RecordingsBucket
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref RecordingsBucket
          object:
            key:
              - prefix: "recordings/"
              - prefix: "inbound/"
      Targets:
        - Id: RecordingMetadataWriterFnTarget
          Arn: !GetAtt RecordingMetadataWriterFn.Arn

  # --- RecordingMetadataWriter Lambda Permission for EventBridge (Phase 6.7) ---
  # Grants the EventBridge service principal lambda:InvokeFunction on
  # the RecordingMetadataWriter Function, scoped to the Rule above.
  # Without this Permission the Rule fires but the Lambda invocation
  # is denied (mirrors the Phase 6.4 TranscribeStarter pattern).
  RecordingMetadataWriterFnEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RecordingMetadataWriterFn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt RecordingMetadataWriterEventRule.Arn

  # ===== Phase 7.2: Connect Recording Relocator =====
  # Amazon Connect writes call recordings to S3 using a fixed key
  # layout (``<configured-prefix>/.../CallRecordings/<yyyy>/<mm>/<dd>/
  # <contactId>_<ts>_UTC.wav``). The project design mandates
  # ``recordings/{cycleId}/{employeeId}/{seq}.wav`` so that the
  # Phase 6.4 TranscribeStarter and Phase 6.7 RecordingMetadataWriter,
  # which key off the design layout, can do their job. This block
  # introduces the bridge:
  #
  #   * ``RecordingRelocatorFn`` — listens for ObjectCreated under
  #     ``connect-raw/`` (parameter ``ConnectRecordingsPrefix``),
  #     resolves contactId → (cycleId, employeeId, callAttempts) via
  #     the Response table's ``ContactIdIndex`` GSI (added in this
  #     phase), then CopyObject + DeleteObject to the design layout.
  #     The resulting design-layout PutObject re-fires EventBridge
  #     which TranscribeStarter / RecordingMetadataWriter now match.
  #
  #   * ``ConnectCallRecordingsStorageConfig`` — optional, gated by
  #     ``ManageConnectStorageConfig`` Parameter (default ``false``).
  #     Configures Connect to write recordings to ``RecordingsBucket``
  #     under the configured prefix, encrypted with the project CMK.
  #     The parameter gate exists because ``CALL_RECORDINGS`` storage
  #     config is one-per-instance and would otherwise fail when the
  #     externally-managed instance already has one.

  # --- RecordingRelocator IAM Execution Role (Phase 7.2) ---
  # Permissions required:
  #   1. dynamodb:Query on the Response table's ContactIdIndex GSI.
  #      Note the resource ARN must include the ``/index/`` suffix —
  #      table-level Query permission does NOT grant GSI Query.
  #   2. s3:GetObject + s3:DeleteObject on the Connect-native prefix
  #      (read the raw upload, delete after relocation).
  #   3. s3:PutObject on the design-layout prefixes
  #      (``recordings/`` and ``inbound/``). The PutObject is part of
  #      ``CopyObject`` which is conceptually GetObject + PutObject.
  #   4. kms:Decrypt + kms:GenerateDataKey via DynamoDB and S3
  #      (matches the Phase 6.4 / 6.7 ViaService pattern, ADR-0003
  #      stage 3 limited rollout).
  RecordingRelocatorFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-recording-relocator-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: ResponseContactIdIndexQuery
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !Sub "${ResponseTable.Arn}/index/ContactIdIndex"
        - PolicyName: RecordingsBucketRelocate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "${RecordingsBucket.Arn}/${ConnectRecordingsPrefix}*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub "${RecordingsBucket.Arn}/recordings/*"
                  - !Sub "${RecordingsBucket.Arn}/inbound/*"
        - PolicyName: CmkDecryptEncryptViaDynamoDBAndS3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService:
                      - !Sub "dynamodb.${AWS::Region}.amazonaws.com"
                      - !Sub "s3.${AWS::Region}.amazonaws.com"

  # --- RecordingRelocator Lambda Function (Phase 7.2) ---
  # Triggered by EventBridge for S3 ``Object Created`` events whose
  # key starts with the Connect-native prefix
  # (``ConnectRecordingsPrefix``). Parses contactId, queries the
  # Response GSI, S3 CopyObject + DeleteObject. Timeout 30s gives
  # headroom for two GSI retries + the round-trip S3 ops. No DLQ
  # configured — async retries handle transient failures, and a
  # genuine "no GSI row" raise will surface in Lambda Errors metric
  # for Phase 12 alarms; Phase 14 statement is to evaluate whether
  # a relocator DLQ is also warranted (mirrors RecordingMetadataWriter
  # DLQ from Phase 6.7 if so).
  RecordingRelocatorFnLogGroup:
    # LogGroup for RecordingRelocatorFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-recording-relocator-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  RecordingRelocatorFn:
    Type: AWS::Lambda::Function
    DependsOn: RecordingRelocatorFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-recording-relocator-${EnvironmentName}"
      Description: Rename Connect-native recordings to design layout (Requirements 10.1, 10.2, D5)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/recording_relocator/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt RecordingRelocatorFnExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          RECORDINGS_BUCKET_NAME: !Ref RecordingsBucket
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          CONTACT_ID_INDEX_NAME: ContactIdIndex
          CONNECT_RECORDINGS_PREFIX: !Ref ConnectRecordingsPrefix

  # --- RecordingRelocator EventBridge Rule (Phase 7.2) ---
  # Matches S3 ``Object Created`` events whose key starts with the
  # Connect-native prefix. The TranscribeStarter / RecordingMetadataWriter
  # rules above are prefix-filtered to ``recordings/`` and ``inbound/``
  # so the three rules carve the bucket's event stream into disjoint
  # slices and there's no overlap.
  RecordingRelocatorEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "safety-confirmation-recording-relocate-${EnvironmentName}"
      Description: Fire RecordingRelocator when Connect drops a raw recording in RecordingsBucket
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref RecordingsBucket
          object:
            key:
              - prefix: !Ref ConnectRecordingsPrefix
      Targets:
        - Id: RecordingRelocatorFnTarget
          Arn: !GetAtt RecordingRelocatorFn.Arn

  # --- RecordingRelocator Lambda Permission for EventBridge (Phase 7.2) ---
  RecordingRelocatorFnEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RecordingRelocatorFn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt RecordingRelocatorEventRule.Arn

  # --- Connect Call Recordings Storage Config (Phase 7.2, conditional) ---
  # ``AWS::Connect::InstanceStorageConfig`` for ResourceType
  # ``CALL_RECORDINGS`` is one-per-instance. The
  # ``ManageConnectStorageConfigCond`` gate lets deployers ship this
  # template against a Connect instance that already has a CALL_RECORDINGS
  # storage config (in which case the gate stays ``false`` and the
  # operator wires the storage config out-of-band) or to claim ownership
  # of the storage config via CFn (gate ``true``).
  #
  # The destination prefix is the Parameter ``ConnectRecordingsPrefix``
  # (default ``connect-raw/``); Connect always appends
  # ``/CallRecordings/<yyyy>/<mm>/<dd>/<contactId>_<ts>_UTC.wav`` to it.
  # ``EncryptionConfig`` uses the project CMK — Phase 12.x will revisit
  # the CMK key policy to ensure ``connect.amazonaws.com`` is granted
  # the necessary ``kms:GenerateDataKey`` permission via ``kms:ViaService``.
  ConnectCallRecordingsStorageConfig:
    Type: AWS::Connect::InstanceStorageConfig
    Condition: ManageConnectStorageConfigCond
    Properties:
      InstanceArn: !Ref ConnectInstanceArn
      ResourceType: CALL_RECORDINGS
      StorageType: S3
      S3Config:
        BucketName: !Ref RecordingsBucket
        BucketPrefix: !Ref ConnectRecordingsPrefix
        EncryptionConfig:
          EncryptionType: KMS
          KeyId: !GetAtt KmsCmk.Arn

  # ===== Phase 8.1: KeywordMatcher Lambda =====
  # Triggered by EventBridge for S3 ``Object Created`` events on the
  # TranscriptsBucket. The pipeline reads the transcript JSON,
  # resolves the Cycle's snapshotted dictionary version
  # (`get_dictionary_snapshot` from Phase 4.2), classifies the
  # transcript text into a Voice_Status using the priority order
  # INJURED > UNAVAILABLE > SAFE > OTHER (Property 10), and updates
  # Response + TranscriptMeta. Inbound transcripts (`inbound/*` keys)
  # are intentionally raised in Phase 8.1; Phase 9 InboundHandler
  # extends this Lambda once InboundContactTable linkage is online.

  # --- KeywordMatcher IAM Execution Role (Phase 8.1) ---
  # Permissions required:
  #   1. s3:GetObject on TranscriptsBucket/* — read the Transcribe
  #      JSON output that fired the EventBridge rule.
  #   2. dynamodb:GetItem on CycleTable — resolve ``dictionaryVersion``.
  #   3. dynamodb:Query on KeywordDictionaryHistoryTable — fetch the
  #      keyword set at the resolved version.
  #   4. dynamodb:UpdateItem on ResponseTable — write voiceStatus /
  #      matchedKeywords / transcriptExcerpt / dictionaryVersion.
  #   5. dynamodb:UpdateItem on TranscriptMetaTable — augment the row
  #      that TranscribeStarter (Phase 6.4) created with the
  #      post-completion fields (excerpt, confidence, languageCode).
  #   6. kms:Decrypt + kms:GenerateDataKey via DynamoDB and S3
  #      (ADR-0003 stage 3 limited rollout, mirrors Phase 6.4 / 7.2
  #      ViaService pattern).
  KeywordMatcherFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-keyword-matcher-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
      Policies:
        - PolicyName: TranscriptsBucketRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "${TranscriptsBucket.Arn}/*"
        - PolicyName: CycleGetItem
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                Resource: !GetAtt CycleTable.Arn
        - PolicyName: KeywordDictionaryHistoryQuery
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !GetAtt KeywordDictionaryHistoryTable.Arn
        - PolicyName: ResponseUpdateAndTranscriptMetaUpdate
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt ResponseTable.Arn
                  - !GetAtt TranscriptMetaTable.Arn
        - PolicyName: CmkDecryptEncryptViaDynamoDBAndS3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService:
                      - !Sub "dynamodb.${AWS::Region}.amazonaws.com"
                      - !Sub "s3.${AWS::Region}.amazonaws.com"

  # --- KeywordMatcher Lambda Function (Phase 8.1) ---
  # Triggered by EventBridge for S3 ``Object Created`` events on the
  # TranscriptsBucket. Timeout 30s gives headroom for: S3 GetObject
  # (transcript body) + Cycle.GetItem + KeywordDictionaryHistory.Query
  # (one or more pages) + Response.UpdateItem + TranscriptMeta.UpdateItem.
  KeywordMatcherFnLogGroup:
    # LogGroup for KeywordMatcherFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-keyword-matcher-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  KeywordMatcherFn:
    Type: AWS::Lambda::Function
    DependsOn: KeywordMatcherFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-keyword-matcher-${EnvironmentName}"
      Description: Classify Transcript text into Voice_Status with priority INJURED > UNAVAILABLE > SAFE > OTHER (Requirements 7.1-7.8, Property 10)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/keyword_matcher/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt KeywordMatcherFnExecutionRole.Arn
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          TRANSCRIPTS_BUCKET_NAME: !Ref TranscriptsBucket
          TRANSCRIPT_META_TABLE_NAME: !Ref TranscriptMetaTable
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          CYCLE_TABLE_NAME: !Ref CycleTable
          KEYWORD_DICT_HISTORY_TABLE_NAME: !Ref KeywordDictionaryHistoryTable

  # --- KeywordMatcher EventBridge Rule (Phase 8.1) ---
  # Matches S3 "Object Created" events for the TranscriptsBucket.
  # Phase 2.11 enabled the EventBridgeConfiguration on the bucket.
  # Both outbound (``transcripts/{cycleId}/...``) and inbound
  # (``inbound/{yyyymm}/...``) prefixes flow through; the handler
  # discriminates based on the parsed key shape (Phase 8.1 outbound
  # only; Phase 9 will lift the inbound restriction).
  KeywordMatcherEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "safety-confirmation-transcript-created-${EnvironmentName}"
      Description: Fire KeywordMatcher when a transcript lands in TranscriptsBucket
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref TranscriptsBucket
          object:
            key:
              - prefix: "transcripts/"
              - prefix: "inbound/"
      Targets:
        - Id: KeywordMatcherFnTarget
          Arn: !GetAtt KeywordMatcherFn.Arn

  # --- KeywordMatcher Lambda Permission for EventBridge (Phase 8.1) ---
  # Grants the EventBridge service principal lambda:InvokeFunction on
  # the KeywordMatcher Function, scoped to the Rule above.
  KeywordMatcherFnEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref KeywordMatcherFn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt KeywordMatcherEventRule.Arn

  # ===== Phase 9.2: InboundHandler Lambda =====
  # Invoked twice per inbound contact by the Inbound Contact Flow
  # (Phase 9.1, ``infrastructure/contact-flows/inbound.json``):
  #   * step=identify   — Caller-ID → Employee lookup, recent-Cycle
  #                       Query + pure decision function, provisional
  #                       Inbound_Contact write, ``flow`` attribute
  #                       returned (ACTIVE_CYCLE / NO_CYCLE /
  #                       NOT_REGISTERED / CYCLE_TERMINATED).
  #   * step=finalize   — Inbound_Contact final-record write;
  #                       Response.callResultCodes += INBOUND for
  #                       ACTIVE_CYCLE (callAttempts unchanged per
  #                       Requirement 13.5).
  # The Cycle-selection logic lives in
  # ``backend/shared/inbound/cycle_selection.py`` as a pure function so
  # Phase 9.3 can drive Property 11 PBT directly without DynamoDB
  # mocks (project principle 19(a) — DRY).

  # --- InboundHandler IAM Execution Role (Phase 9.2) ---
  # Permissions required:
  #   1. dynamodb:Query on EmployeeTable PhoneNumberIndex GSI — caller-ID
  #      to Employee lookup at identify time.
  #   2. dynamodb:Query on CycleTable StatusStartedAtIndex GSI — recent
  #      Cycle scan (RUNNING / COMPLETED / TIMEOUT / START_FAILED).
  #   3. dynamodb:PutItem + UpdateItem on InboundContactTable —
  #      provisional row at identify, finalized row at finalize.
  #   4. dynamodb:PutItem + UpdateItem on ResponseTable — append INBOUND
  #      to callResultCodes for ACTIVE_CYCLE flow at finalize.
  #   5. kms:Decrypt + kms:GenerateDataKey via DynamoDB — required for
  #      the SSE-KMS encrypted tables (ADR-0003 stage 3 limited rollout,
  #      mirrors Phase 6.4 / 7.2 / 8.1 ViaService pattern).
  # Connect itself does not invoke this Role; Connect invokes the
  # Function via AWS::Lambda::Permission (below).
  InboundHandlerFnExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-inbound-handler-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref LambdaBaseLogsManagedPolicy
        - !Ref AuditLogWriteManagedPolicy # Phase 12.3: AuditLogGroup 書込権限
      Policies:
        - PolicyName: EmployeeTablePhoneNumberQuery
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !GetAtt EmployeeTable.Arn
                  - !Sub "${EmployeeTable.Arn}/index/PhoneNumberIndex"
        - PolicyName: CycleTableStatusQuery
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !GetAtt CycleTable.Arn
                  - !Sub "${CycleTable.Arn}/index/StatusStartedAtIndex"
        - PolicyName: InboundContactTableWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt InboundContactTable.Arn
        - PolicyName: ResponseTableWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt ResponseTable.Arn
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- InboundHandler Lambda Function (Phase 9.2) ---
  # Invoked from the Inbound Contact Flow's ``Invoke AWS Lambda
  # function`` blocks (Phase 9.1 inbound.json, action IDs ...0002 with
  # step=identify and ...0008 with step=finalize). Both blocks use
  # ``InvocationTimeLimitSeconds=8`` so the Function's own Timeout
  # must comfortably exceed that — 15s leaves headroom for any
  # transient DynamoDB latency without exceeding Connect's hard cap.
  InboundHandlerFnLogGroup:
    # LogGroup for InboundHandlerFn (Phase 12.1, Requirement 16.5)
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/safety-confirmation-inbound-handler-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  InboundHandlerFn:
    Type: AWS::Lambda::Function
    DependsOn: InboundHandlerFnLogGroup
    Properties:
      FunctionName: !Sub "safety-confirmation-inbound-handler-${EnvironmentName}"
      Description: Inbound callback flow classifier and finalizer (Requirements 13.1-13.8)
      Runtime: python3.12
      Architectures:
        - arm64
      Handler: handler.lambda_handler
      Code: ../backend/lambdas/inbound_handler/
      Layers:
        - !Ref SharedLayer
      Role: !GetAtt InboundHandlerFnExecutionRole.Arn
      Timeout: 15
      MemorySize: 512
      Environment:
        Variables:
          EMPLOYEE_TABLE_NAME: !Ref EmployeeTable
          CYCLE_TABLE_NAME: !Ref CycleTable
          RESPONSE_TABLE_NAME: !Ref ResponseTable
          INBOUND_CONTACT_TABLE_NAME: !Ref InboundContactTable
          INBOUND_RECEPTION_WINDOW_DAYS: !Ref InboundReceptionWindowDays # Phase 15.27b (Req 13.5/13.6)
          AUDIT_LOG_GROUP_NAME: !Ref AuditLogGroup # Phase 12.3

  # --- InboundHandler Lambda Permission for Amazon Connect (Phase 9.2) ---
  # The Inbound Contact Flow's ``Invoke AWS Lambda function`` blocks
  # (step=identify and step=finalize) call this Function. The grant
  # mirrors CallEndHandlerFnConnectPermission (Phase 6.3): the
  # ``connect.amazonaws.com`` service principal is scoped to this
  # account and Connect instance ARN; SourceAccount + SourceArn
  # together mitigate the confused-deputy class of misuse.
  InboundHandlerFnConnectPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref InboundHandlerFn
      Action: lambda:InvokeFunction
      Principal: connect.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Ref ConnectInstanceArn

  # ===== Phase 6.8: Step Functions Cycle State Machine =====
  # Wave 7 completion piece. The state machine name
  # `safety-confirmation-cycle-${EnvironmentName}` matches the
  # forward-named ARN that CycleApi (Phase 5.3) / ConnectDispatcher
  # (Phase 6.2) / CallEndHandler (Phase 6.3) / CycleFinalizer
  # (Phase 6.6) already reference via env-var and IAM Policy. With
  # this resource the forward-named references become live.
  #
  # ASL definition lives at
  #   infrastructure/state-machines/cycle-state-machine.asl.json
  # and is uploaded as-is to the S3 packaging bucket by
  #   `aws cloudformation package`
  # via the DefinitionS3Location property. Phase 6.8 design choices
  # are documented inside the JSON file's "Comment" fields:
  #   - StartTimers is a Pass state in v1 (no dynamic EventBridge
  #     putRule from inside the SFN; revisited in Phase 14).
  #   - ReadResponse is inserted between WaitForTranscribe and
  #     EvaluateRetry because RetryEvaluator (Phase 6.5) is a pure-
  #     computation Lambda with no DynamoDB access.
  #   - callResultCode is OMITTED from the EvaluateRetry payload
  #     because (a) should_retry does not consume it today and
  #     (b) ASL Parameters cannot conditionally include a JSONPath
  #     that may be absent.
  #   - currentAttempt is an SFN-internal counter incremented via
  #     States.MathAdd($.currentAttempt, 1) at IncrementAttempt.

  # --- SFN CloudWatch Logs LogGroup (Phase 6.8) ---
  # SFN cannot deploy with LoggingConfiguration unless the destination
  # LogGroup already exists. Phase 12.2 originally scoped the LogGroup,
  # but the wire-up only makes sense alongside the State Machine — so
  # the LogGroup ships in this Phase 6.8 commit and Phase 12.2 records
  # "Done When" against the same resource. Retention follows
  # LogRetentionDays (Requirement 16.5).
  CycleStateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/safety-confirmation-cycle-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays

  # --- SFN Execution Role (Phase 6.8) ---
  # Permissions required for the Cycle state machine's tasks:
  #   1. lambda:InvokeFunction on the 4 Lambdas referenced from the
  #      ASL: LoadTargets / ConnectDispatcher / RetryEvaluator /
  #      CycleFinalizer. (CallEndHandler is invoked by the Connect
  #      Contact Flow, NOT by the SFN; TranscribeStarter and
  #      RecordingMetadataWriter are invoked by EventBridge.)
  #   2. dynamodb:PutItem + UpdateItem + GetItem on ResponseTable for
  #      InitAttempt (PutItem with attribute_not_exists), ReadResponse
  #      (GetItem with ConsistentRead=true), and FinalizeOne /
  #      FinalizeOneError (UpdateItem).
  #   3. CloudWatch Logs APIs required by SFN's LoggingConfiguration.
  #      AWS documents these as "*" resource for SFN logging — the
  #      service uses log-delivery APIs that don't accept Resource
  #      scoping (see https://docs.aws.amazon.com/step-functions/
  #      latest/dg/cw-logs.html#cloudwatch-iam-policy).
  #   4. KMS Decrypt + GenerateDataKey on the project CMK, scoped via
  #      kms:ViaService to dynamodb.<region>.amazonaws.com — the only
  #      service principal that uses the CMK on the SFN's behalf is
  #      DynamoDB (the Response table is SSE-KMS).
  CycleStateMachineExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-cycle-sfn-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub "states.${AWS::Region}.amazonaws.com"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeCycleLambdas
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt LoadTargetsFn.Arn
                  - !GetAtt ConnectDispatcherFn.Arn
                  - !GetAtt RetryEvaluatorFn.Arn
                  - !GetAtt CycleFinalizerFn.Arn
        - PolicyName: ResponseTableReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: !GetAtt ResponseTable.Arn
        - PolicyName: CloudWatchLogsForSfn
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"
        - PolicyName: CmkEncryptDecryptViaDynamoDB
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt KmsCmk.Arn
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "dynamodb.${AWS::Region}.amazonaws.com"

  # --- Cycle State Machine (Phase 6.8) ---
  # Standard workflow type — long-running (60-minute SLA) with full
  # execution history. STANDARD vs EXPRESS: Express is for high-volume,
  # short-duration (< 5 minutes), at-least-once executions; this state
  # machine has Wait states summing to many minutes and demands
  # exactly-once execution per cycle, so STANDARD is the only valid
  # choice.
  #
  # DefinitionS3Location points to a LOCAL path that
  # `aws cloudformation package` rewrites into an S3 URI by uploading
  # the file as-is to the packaging bucket. The path is relative to
  # the template file's directory (infrastructure/template.yaml ->
  # infrastructure/state-machines/cycle-state-machine.asl.json).
  #
  # DefinitionSubstitutions injects the runtime values that the ASL
  # references via ${...} placeholders. All 6 placeholders in the
  # JSON file must appear here.
  #
  # LoggingConfiguration: Level=ALL captures every state transition;
  # IncludeExecutionData=true logs the state input/output bodies. This
  # is verbose but invaluable for Phase 14 integration testing. Phase
  # 12 may revisit the level for production (cost trade-off).
  CycleStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "safety-confirmation-cycle-${EnvironmentName}"
      StateMachineType: STANDARD
      RoleArn: !GetAtt CycleStateMachineExecutionRole.Arn
      DefinitionS3Location: state-machines/cycle-state-machine.asl.json
      DefinitionSubstitutions:
        LoadTargetsFnArn: !GetAtt LoadTargetsFn.Arn
        ConnectDispatcherFnArn: !GetAtt ConnectDispatcherFn.Arn
        RetryEvaluatorFnArn: !GetAtt RetryEvaluatorFn.Arn
        CycleFinalizerFnArn: !GetAtt CycleFinalizerFn.Arn
        ResponseTableName: !Ref ResponseTable
        MaxConcurrentCalls: !Ref MaxConcurrentCalls
      LoggingConfiguration:
        Level: ALL
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt CycleStateMachineLogGroup.Arn

  # Phase 4.1: DictionaryApi 関連リソース is intentionally above.
  # Phase 5.1 onwards (API Gateway shared infrastructure) follows.

  # --- API Gateway: Account-level CloudWatch Logs role (Phase 5.1) ---
  # AWS::ApiGateway::Account is a REGION-wide setting (one resource per
  # account/region). It links the API Gateway service to an IAM role
  # that lets it write Execution Logs / Access Logs to CloudWatch Logs.
  # If this account already had a different API Gateway with its own
  # Account setting, this resource will OVERWRITE the prior CloudWatch
  # role binding. The dev account is dedicated to this project, so the
  # overwrite is safe.
  ApiGatewayLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "safety-confirmation-apigw-logs-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayLogsRole.Arn

  # --- API Gateway: Execution and Access logs (Phase 5.1) ---
  # Per-stage log groups. Retention follows LogRetentionDays parameter
  # (Requirement 16.5).
  ApiGwExecutionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/safety-confirmation-${EnvironmentName}/execution"
      RetentionInDays: !Ref LogRetentionDays

  ApiGwAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/safety-confirmation-${EnvironmentName}/access"
      RetentionInDays: !Ref LogRetentionDays

  # --- API Gateway: REST API and Cognito Authorizer (Phase 5.1) ---
  # The Authorizer is defined once and referenced by every Method's
  # `AuthorizerId` in Phase 5.2-5.5 / 5.6 (except AuthFailureReporter
  # which is public per design). The Deployment and Stage resources
  # come in Phase 5.6 after all Method resources exist, so the very
  # first Deployment captures the full API surface in one shot.
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "safety-confirmation-${EnvironmentName}"
      Description: Safety Confirmation System REST API (Administrator-only except /auth/record-failure)
      EndpointConfiguration:
        Types:
          - REGIONAL

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub "CognitoUserPoolAuthorizer-${EnvironmentName}"
      RestApiId: !Ref RestApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt CognitoUserPool.Arn

  # ===== Phase 5.7: API Gateway Resource ツリー =====

  # --- /auth/record-failure (PUBLIC, no Authorizer) ---
  AuthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: auth

  AuthRecordFailureResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref AuthResource
      PathPart: record-failure

  # --- /cycles tree ---
  CyclesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: cycles

  CyclesIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesResource
      PathPart: "{id}"

  CyclesIdStatusResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdResource
      PathPart: status

  CyclesIdResponsesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdResource
      PathPart: responses

  CyclesIdResponsesEmployeeIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdResponsesResource
      PathPart: "{employeeId}"

  CyclesIdRecordingsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdResource
      PathPart: recordings

  CyclesIdRecordingsEmployeeIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdRecordingsResource
      PathPart: "{employeeId}"

  CyclesIdRecordingsEmployeeIdSeqResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdRecordingsEmployeeIdResource
      PathPart: "{seq}"

  CyclesIdTranscriptsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdResource
      PathPart: transcripts

  CyclesIdTranscriptsEmployeeIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdTranscriptsResource
      PathPart: "{employeeId}"

  CyclesIdTranscriptsEmployeeIdSeqResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref CyclesIdTranscriptsEmployeeIdResource
      PathPart: "{seq}"

  # --- /employees tree ---
  EmployeesResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: employees

  EmployeesIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref EmployeesResource
      PathPart: "{id}"

  # Task 15.12: /employees/{id}/anonymize — irreversible ID hash on
  # personal-data deletion request (privacy.md §6.3 step 3).
  EmployeesIdAnonymizeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref EmployeesIdResource
      PathPart: anonymize

  # Task 15.16: /employees/{id}/cognito-user — SPA-driven Cognito user
  # deletion for retired admin accounts (privacy.md §6.1 final step).
  # The Lambda enforces Administrator group + logical-deleted +
  # cognitoSub presence; IAM permission cognito-idp:AdminDeleteUser is
  # already granted via the CognitoAdminUserManagement policy.
  EmployeesIdCognitoUserResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref EmployeesIdResource
      PathPart: cognito-user

  EmployeesImportResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref EmployeesResource
      PathPart: import

  # --- /keyword-dictionary tree ---
  KeywordDictionaryResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: keyword-dictionary

  KeywordDictionaryVersionResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !Ref KeywordDictionaryResource
