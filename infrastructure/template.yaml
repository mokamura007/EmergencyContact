          ThrottlingBurstLimit:
            !FindInMap [EnvMap, !Ref EnvironmentName, ApiThrottleBurst]

  # ===== Phase 11.2: CloudFront Origin Access Control (OAC) =====
  # Modern replacement for the legacy Origin Access Identity (OAI). OAC
  # uses SigV4 to sign requests from CloudFront to the S3 origin, which
  # is required for SSE-KMS buckets and is also the AWS-recommended
  # approach for SSE-S3 buckets going forward. Phase 2.11 already
  # provisioned SpaBucket with SSE-S3 + BPA all-true + Versioning ON
  # and intentionally deferred the BucketPolicy to Phase 11; the
  # SpaBucketPolicy below is the OAC-only access policy referenced by
  # that Phase 2.11 comment.
  SpaOac:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-safety-confirmation-spa-oac"
        Description: !Sub "OAC for SPA bucket (${EnvironmentName} environment, SigV4 to S3 origin)"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ===== Phase 11.2: CloudFront Distribution for SPA =====
  # Origin: SpaBucket via OAC (RegionalDomainName, not the legacy global
  # DomainName, to avoid 307 redirects on first put-after-create).
  # Cache behaviors: GET/HEAD only with HTTPS redirect; AWS Managed
  # CachingOptimized policy (658327ea-f89d-4fab-a63d-7e88639e58f6).
  # SPA fallback: 403 and 404 both rewrite to /index.html with HTTP 200
  # so client-side routing (React Router) can take over.
  # Aliases: only when HasCustomDomain (DomainName non-empty); otherwise
  # the distribution responds on the default *.cloudfront.net domain.
  # ViewerCertificate: !If split between ACM (UseCustomCert) and
  # CloudFrontDefaultCertificate. SslSupportMethod sni-only + min
  # TLSv1.2_2021 per NFR3.
  # HttpVersion http2and3 / IPv6Enabled true / PriceClass_200 (covers
  # Asia, North America, Europe — includes the Tokyo edge per AWS
  # documentation as of 2026-06).
  SpaDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "Safety Confirmation SPA distribution (${EnvironmentName})"
        DefaultRootObject: index.html
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: PriceClass_200
        Aliases: !If [HasCustomDomain, [!Ref DomainName], !Ref "AWS::NoValue"]
        Origins:
          - Id: SpaS3Origin
            DomainName: !GetAtt SpaBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SpaOac.Id
            S3OriginConfig:
              # When OAC is used, OriginAccessIdentity MUST be empty.
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: SpaS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          # AWS Managed Cache Policy: CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          # SPA fallback per design.md / Architecture / Edge: 403 and
          # 404 from S3 both serve /index.html so the SPA router can
          # handle the path. ErrorCachingMinTTL=0 keeps CloudFront from
          # caching transient origin errors at the edge.
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate: !If
          - UseCustomCert
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  # ===== Phase 11.2: SpaBucket bucket policy (OAC-only access) =====
  # Allows CloudFront's OAC service principal to GetObject from SpaBucket.
  # AWS:SourceArn condition mitigates the confused-deputy risk by binding
  # the grant to THIS specific distribution. Phase 2.11 deferred this
  # policy to Phase 11; it is added here for the first time and does not
  # conflict with any previously-installed policy (none existed).
  SpaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SpaBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipalRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SpaBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${SpaDistribution}"

  # ===== Phase 11.3: Route 53 ALIAS record (optional) =====
  # Only created when BOTH DomainName AND HostedZoneId are provided
  # (HasCustomDomainAndHostedZone condition). AliasTarget.HostedZoneId
  # is the AWS-fixed CloudFront global zone ID (Z2FDTNDATAQYW2 — see
  # https://docs.aws.amazon.com/general/latest/gr/aws_service_endpoints.html),
  # NOT the Route 53 hosted zone we are writing into. EvaluateTargetHealth
  # is false because CloudFront distributions don't expose origin health
  # in the ALIAS evaluation sense. Type A; AAAA is intentionally omitted
  # for v1 — IPv6 routing for CloudFront uses the same hostname so a
  # single A-record ALIAS is sufficient for both v4 and v6 clients.
  SpaRecordSet:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomainAndHostedZone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SpaDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2
        EvaluateTargetHealth: false

