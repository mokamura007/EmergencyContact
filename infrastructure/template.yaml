# ----- Rules -----
# Phase 16.4: CFn API 境界での 2 段防御 (ADR-0010 §3.4 第 3 段 / §6.3.3)。
#
# ADR-0010 §3.4 の MOCK_MODE は dev 専用の Connect / Transcribe スタブ経路を
# 開く。プロダクションでの誤投入を完全に塞ぐため、本プロジェクトは 2 段で守る:
#
#   1. Lambda handler 側 (Phase 16.2 / 16.3 で実装):
#      effective_mock = MOCK_MODE=="true" AND ENVIRONMENT_NAME != "prod"
#      → prod スタックが誤って MockMode=true を持っても、handler が
#        runtime で mock パスを拒否する。
#
#   2. CFn Rules (本セクション、Phase 16.4 で実装):
#      EnvironmentName="prod" AND MockMode="true" の組合せを
#      CreateStack / UpdateStack API 呼出し時点で拒否する。
#      → handler のガードが壊れても (もしくは将来削除されても)、
#        スタック作成 / 更新自体が失敗するため、prod に mock コードが
#        deploy されるルート自体が消える。
#
# 両者は独立した防御線で、両方同時に壊れない限り prod で mock 経路は
# 動作しない (defence-in-depth)。
Rules:
  ProdMockModeForbidden:
    RuleCondition: !Equals [!Ref EnvironmentName, "prod"]
    Assertions:
      - Assert: !Equals [!Ref MockMode, "false"]
        AssertDescription: "MockMode は prod 環境で 'false' でなければならない（ADR-0010 §3.4 / §6.3.3）"
