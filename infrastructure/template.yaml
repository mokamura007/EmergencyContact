      - ApiGatewayAccount
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeploymentV2Cors
      StageName: !Ref EnvironmentName
      Description: !Sub "Safety Confirmation API stage for environment ${EnvironmentName}"
      AccessLogSetting:
        DestinationArn: !GetAtt ApiGwAccessLogGroup.Arn
        Format: '{"requestId":"$context.requestId","sourceIp":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.resourcePath","status":"$context.status","len":"$context.responseLength","latency":"$context.responseLatency"}'
