  # distinct logical ID) — CFn does not automatically redeploy on Method
  # additions. The Stage references the Deployment; throttling and log
  # settings live on the Stage.
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - AuthRecordFailureMethod
